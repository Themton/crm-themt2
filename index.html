async function api(action,params,body){var base=getApiUrl();if(!base)throw new Error("NO_API");var u=new URL(base);u.searchParams.set("action",action);if(params)Object.keys(params).forEach(function(k){u.searchParams.set(k,params[k]);});var opts=body?{method:"POST",body:JSON.stringify(body),redirect:"follow"}:{redirect:"follow"};var r=await fetch(u.toString(),opts);return await r.json();}
function lookupZIP(sub,dist){if(typeof TH==="undefined")return"";if(sub&&dist){for(var i=0;i<TH.length;i++){if(TH[i][0]===sub&&TH[i][1]===dist)return String(TH[i][3]);}}if(sub){for(var i=0;i<TH.length;i++){if(TH[i][0]===sub&&(!dist||TH[i][1].indexOf(dist)>=0||dist.indexOf(TH[i][1])>=0))return String(TH[i][3]);}for(var i=0;i<TH.length;i++){if(TH[i][0]===sub)return String(TH[i][3]);}}if(dist){for(var i=0;i<TH.length;i++){if(TH[i][1]===dist)return String(TH[i][3]);}}return"";}
function smartParse(t){t=t.trim();if(!t)return null;var r={MobileNo:"",Name:"",Address:"",SubDistrict:"",District:"",Province:"",ZIP:"",CustomerFBLine:"",SalePrice:"",COD:"",Remark:""};var pm=t.match(/\b(0[689]\d[\s-]?\d{3,4}[\s-]?\d{4})\b/);if(pm){r.MobileNo=pm[1].replace(/[\s-]/g,"").substring(0,10);}var zm=t.match(/\b(\d{5})\b/);if(zm)r.ZIP=zm[1];var lines=t.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
  // จับหมายเหตุ: บรรทัดที่มี ปลายทาง/โอนเงิน/สินค้า/Kiso/Rong หรือบรรทัดสุดท้ายที่ไม่ใช่เบอร์/ที่อยู่/ชื่อ
  var remarkLine=lines.find(function(l){return /ปลายทาง|โอนเงิน|Kiso|Rong|เซรั่ม|เอสเซน|สบู่|ครีม/i.test(l);});
  if(!remarkLine&&lines.length>2){var last=lines[lines.length-1];if(!/^0[689]\d/.test(last)&&!/ต\.|ตำบล|อำเภอ|จ\./.test(last))remarkLine=last;}

    // จับราคาจาก "ปลายทาง XXX" หรือ "XXX บาท" หรือตัวเลขท้าย

    if(/โอนเงิน|โอน$/i.test(remarkLine)){r.COD="0";}
  }
  // จับ P:ชื่อ
  var pLine=lines.find(function(l){return /^P:/i.test(l);});
  // จับชื่อ
  var nl=lines.find(function(l){return /^(คุณ|นาย|นาง|น\.?ส\.?|นางสาว)/i.test(l);});if(!nl)nl=lines.find(function(l){if(/^0[689]\d/.test(l))return false;if(/^\d+[\s\/]|ถนน|ซอย|หมู่|ศัพท์/.test(l))return false;if(/\d{5}/.test(l)&&!/\S+\s+\S+/.test(l.replace(/\d{5}/,"")))return false;if(/บาท|ปลายทาง|COD|ราคา/i.test(l))return false;if(/^P:/i.test(l))return false;if(l===remarkLine)return false;if(l.length<2)return false;return true;});
  if(nl){var n=nl;if(r.MobileNo)n=n.replace(r.MobileNo,"");r.Name=n.replace(/\d{5}/,"").trim();}

  if(al){var rem=al;if(r.ZIP)rem=rem.replace(r.ZIP,"");["กทม","กรุงเทพมหานคร","กรุงเทพ","ประเทศไทย"].forEach(function(p){rem=rem.replace(p,"");});rem=rem.trim();var sdm=t.match(/(?:ต\.|ตำบล|แขวง)\s*(\S+)/),dm=t.match(/(?:อ\.|อำเภอ|เขต)\s*(\S+)/);if(sdm)r.SubDistrict=sdm[1];if(dm)r.District=dm[1];if(!r.SubDistrict||!r.District){var pts=rem.split(/\s+/).filter(function(p){return p.length>0;});if(pts.length>=3){var ae=0;for(var i=0;i<pts.length;i++){if(/\d|ถนน|ซอย|หมู่|ศัพท์/.test(pts[i]))ae=i+1;}var af=pts.slice(ae);if(!r.SubDistrict&&af.length>=1)r.SubDistrict=af[0];if(!r.District&&af.length>=2)r.District=af[1];r.Address=pts.slice(0,ae).join(" ");}else r.Address=rem;}else{var a=rem;if(r.SubDistrict)a=a.replace(r.SubDistrict,"");if(r.District)a=a.replace(r.District,"");r.Address=a.replace(/(?:ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต)\s*/g,"").trim();}}

function lookupProvince(sub,dist){if(typeof TH==="undefined")return"";if(sub&&dist){for(var i=0;i<TH.length;i++){if(TH[i][0]===sub&&TH[i][1]===dist)return TH[i][2];}}if(sub){for(var i=0;i<TH.length;i++){if(TH[i][0]===sub)return TH[i][2];}}if(dist){for(var i=0;i<TH.length;i++){if(TH[i][1]===dist)return TH[i][2];}}return"";}

function AddrAC({label,value,field,onSelect,onChange}){var[show,setShow]=useState(false);var[items,setItems]=useState([]);function handleChange(v){onChange(v);if(v.length>=1){setItems(searchAddr(v,field));setShow(true);}else setShow(false);}function pick(item){onSelect(item);setShow(false);}return<div style={{position:"relative"}}><label style={S.fLabel}>{label}</label><input value={value||""} onChange={function(e){handleChange(e.target.value);}} onFocus={function(){if(value)handleChange(value);}} onBlur={function(){setTimeout(function(){setShow(false);},200);}} style={S.pInput}/>{show&&items.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,maxHeight:200,overflowY:"auto",zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,.1)"}}>{items.map(function(it,i){return<div key={i} onClick={function(){pick(it);}} style={{padding:"8px 12px",cursor:"pointer",fontSize:12,borderBottom:"1px solid #f1f5f9"}} onMouseEnter={function(e){e.currentTarget.style.background="#fffbeb";}} onMouseLeave={function(e){e.currentTarget.style.background="";}}>{it[0]} › {it[1]} › {it[2]} <span style={{color:"#d97706",fontWeight:700}}>{it[3]}</span></div>;})}</div>}</div>;}
function App(){var _s=useState;var[apiOk,setApiOk]=_s(!!getApiUrl());var savedUser=null;try{var raw=localStorage.getItem("ps_user");if(raw)savedUser=JSON.parse(raw);}catch(e){}var[user,setUser]=_s(savedUser);var[accounts,setAccounts]=_s([]);var[allOrders,setAllOrders]=_s([]);var[upsellOrders,setUpsellOrders]=_s([]);var[page,setPage]=_s("orders");var[showForm,setShowForm]=_s(false);var[notif,setNotif]=_s(null);var[viewOrder,setViewOrder]=_s(null);var[loading,setLoading]=_s(false);var[products,setProducts]=_s([]);var[slipProgress,setSlipProgress]=_s(null);var[selDate,setSelDate]=_s(todayStr());var userRef=useRef(savedUser);
  function notify(msg,type){setNotif({msg:msg,type:type||"success"});setTimeout(function(){setNotif(null);},3500);}

  return(<div style={S.app}>{notif&&<div style={{...S.notif,background:notif.type==="success"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#f59e0b,#d97706)"}}>{notif.type==="success"?"✅":"⚠️"} {notif.msg}</div>}{slipProgress!==null&&<div style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"#fff",borderRadius:20,padding:"36px 48px",textAlign:"center",minWidth:280}}><div style={{fontSize:40,marginBottom:8}}>{slipProgress>=100?"✅":"🧾"}</div><div style={{fontSize:16,fontWeight:800,color:slipProgress>=100?"#059669":"#d97706"}}>{slipProgress>=100?"เสร็จสิ้น!":"อัพโหลดสลิป..."}</div><div style={{fontSize:28,fontWeight:800,color:slipProgress>=100?"#059669":"#d97706",margin:"8px 0"}}>{slipProgress}%</div><div style={{height:8,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:slipProgress+"%",background:slipProgress>=100?"#10b981":"#d97706",borderRadius:4,transition:"width .3s"}}/></div></div></div>}

    {saving&&<div style={{position:"absolute",inset:0,zIndex:10,background:"rgba(255,255,255,.85)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}><div style={{width:36,height:36,border:"4px solid #fde68a",borderTopColor:"#d97706",borderRadius:"50%",animation:"spin .8s linear infinite"}}/><div style={{fontSize:14,fontWeight:700,color:"#d97706"}}>กำลังบันทึก...</div></div>}

function DetailModal({order,onClose,onDel,onUploadSlip,isAdmin}){var o=order;var fileRef=useRef(null);function handleFile(e){var file=e.target.files&&e.target.files[0];if(!file)return;if(file.size>5*1024*1024){alert("ไฟล์ใหญ่เกิน 5MB");return;}var reader=new FileReader();reader.onload=function(ev){onUploadSlip(o.OrderID,ev.target.result);};reader.readAsDataURL(file);}return<div style={S.modalOverlay} onClick={onClose}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:480,maxHeight:"90vh",overflow:"auto"}} onClick={function(e){e.stopPropagation();}}>

  <div style={{display:"grid",gap:6,fontSize:13}}><div><span style={{color:"#94a3b8"}}>ชื่อ: </span><b>{o.Name}</b></div><div><span style={{color:"#94a3b8"}}>เบอร์: </span>{o.MobileNo}</div><div><span style={{color:"#94a3b8"}}>ที่อยู่: </span>{[o.Address,o.SubDistrict,o.District,o.Province,o.ZIP].filter(Boolean).join(" ")}</div>{o.CustomerFBLine&&<div><span style={{color:"#94a3b8"}}>FB/Line: </span>{o.CustomerFBLine}</div>}<div><span style={{color:"#94a3b8"}}>ราคา: </span><b style={{color:"#d97706"}}>฿{Number(o.SalePrice||0).toLocaleString()}</b></div><div><span style={{color:"#94a3b8"}}>ประเภท: </span>{Number(o.COD||0)>0?<span style={{color:"#ef4444"}}>🔴 COD ฿{Number(o.COD).toLocaleString()}</span>:<span style={{color:"#10b981"}}>🟢 โอนเงิน</span>}</div>{o.Remark&&<div><span style={{color:"#94a3b8"}}>หมายเหตุ: </span>{o.Remark}</div>}</div>

  {isAdmin&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #f1f5f9",textAlign:"right"}}><button onClick={function(){if(confirm("ลบ?"))onDel(o.OrderID);}} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #fecaca",background:"#fff",color:"#ef4444",fontSize:12,cursor:"pointer"}}>🗑 ลบ</button></div>}
</div></div>;}
function ReportPage({user,accounts,allOrders,upsellOrders}){
  var isAdmin=user.role==="admin";
  var[selPerson,setSelPerson]=useState("ALL");
  var[dateFrom,setDateFrom]=useState(todayStr());
  var[dateTo,setDateTo]=useState(todayStr());
  var[expandDate,setExpandDate]=useState(null);
  var[tab,setTab]=useState("orders");
  var[viewOrder,setViewOrder]=useState(null);

  var sourceOrders=tab==="upsell"?(upsellOrders||[]):(allOrders||[]);

  // กรองตามคนและวันที่
  var filtered=sourceOrders.filter(function(o){
    var d=getDate(o.Timestamp);
    if(d<dateFrom||d>dateTo)return false;
    if(selPerson!=="ALL"&&o.SalesPerson!==selPerson)return false;
    return true;
  });

  // สรุปรวม
  var tO=filtered.length,tS=0,tC=0,tT=0;
  filtered.forEach(function(o){tS+=Number(o.SalePrice)||0;var c=Number(o.COD)||0;if(c>0)tC+=c;else tT+=Number(o.SalePrice)||0;});

  // จัดกลุ่มตามวัน
  var dayMap={};
  filtered.forEach(function(o){
    var d=getDate(o.Timestamp);
    if(!dayMap[d])dayMap[d]={date:d,orders:[],sales:0,cod:0,transfer:0};
    dayMap[d].orders.push(o);dayMap[d].sales+=Number(o.SalePrice)||0;
    var c=Number(o.COD)||0;if(c>0)dayMap[d].cod+=c;else dayMap[d].transfer+=Number(o.SalePrice)||0;
  });
  var days=Object.values(dayMap).sort(function(a,b){return b.date>a.date?1:-1;});

  // สรุปแต่ละคน (สำหรับแสดงปุ่มเลือก)
  var personSummary={};
  filtered.forEach(function(o){
    var p=o.SalesPerson||"?";
    if(!personSummary[p])personSummary[p]={name:p,count:0,sales:0};
    personSummary[p].count++;personSummary[p].sales+=Number(o.SalePrice)||0;
  });
  var personList=Object.values(personSummary).sort(function(a,b){return b.count-a.count;});

  // รายชื่อพนักงานทั้งหมด (จาก accounts)
  var staffNames=[];
  if(isAdmin)(accounts||[]).filter(function(a){return a.active;}).forEach(function(a){if(staffNames.indexOf(a.displayName)<0)staffNames.push(a.displayName);});

  return<div>
    <div style={S.pageHeader}><h1 style={S.pageTitle}>📊 รายงาน</h1>
      <div style={{display:"flex",gap:4,padding:3,borderRadius:10,background:"#f1f5f9"}}>
        <button onClick={function(){setTab("orders");setExpandDate(null);}} style={{padding:"8px 18px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:tab==="orders"?"#fff":"transparent",color:tab==="orders"?"#d97706":"#94a3b8",boxShadow:tab==="orders"?"0 1px 3px rgba(0,0,0,.1)":"none"}}>📋 ออเดอร์</button>
        <button onClick={function(){setTab("upsell");setExpandDate(null);}} style={{padding:"8px 18px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:tab==="upsell"?"#fff":"transparent",color:tab==="upsell"?"#ea580c":"#94a3b8",boxShadow:tab==="upsell"?"0 1px 3px rgba(0,0,0,.1)":"none"}}>🔥 Upsell</button>
      </div>
    </div>

    {/* ตัวกรอง */}
    <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:isAdmin?12:0}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>จาก</span>
        <input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13}}/>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>ถึง</span>
        <input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13}}/>
        <button onClick={function(){setDateFrom(todayStr());setDateTo(todayStr());}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>วันนี้</button>
        <button onClick={function(){var d=new Date();d.setDate(d.getDate()-7);setDateFrom(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));setDateTo(todayStr());}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>7 วัน</button>
        <button onClick={function(){var d=new Date();setDateFrom(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01");setDateTo(todayStr());}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>เดือนนี้</button>
      </div>
      {/* เลือกพนักงาน */}
      {isAdmin&&<div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>พนักงาน:</span>
        <button onClick={function(){setSelPerson("ALL");}} style={{padding:"6px 14px",borderRadius:8,border:selPerson==="ALL"?"2px solid #d97706":"1px solid #e2e8f0",background:selPerson==="ALL"?"#fef3c7":"#fff",color:selPerson==="ALL"?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>ทุกคน</button>
        {staffNames.map(function(n){var active=selPerson===n;var ps=personSummary[n];return<button key={n} onClick={function(){setSelPerson(n);}} style={{padding:"6px 14px",borderRadius:8,border:active?"2px solid #d97706":"1px solid #e2e8f0",background:active?"#fef3c7":"#fff",color:active?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{n} {ps?<span style={{fontSize:10,color:"#94a3b8"}}>({ps.count})</span>:""}</button>;})}
      </div>}
    </div>

    {/* สรุปรวม */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
      {[{l:tab==="upsell"?"Upsell":"ออเดอร์",v:tO,c:tab==="upsell"?"#ea580c":"#475569"},{l:"ยอดขาย",v:"฿"+tS.toLocaleString(),c:"#475569"},{l:"COD",v:"฿"+tC.toLocaleString(),c:"#ef4444"},{l:"โอนเงิน",v:"฿"+tT.toLocaleString(),c:"#10b981"}].map(function(s,i){return<div key={i} style={{background:"#fff",borderRadius:10,padding:14,borderLeft:"3px solid "+s.c}}><div style={{fontSize:18,fontWeight:800}}>{s.v}</div><div style={{fontSize:11,color:"#94a3b8"}}>{s.l}</div></div>;})}
    </div>

    {/* สรุปรายคน */}
    {selPerson==="ALL"&&personList.length>1&&<div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>👤 สรุปรายคน {tab==="upsell"?"(Upsell)":""}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
        {personList.map(function(p,i){return<div key={p.name} onClick={function(){setSelPerson(p.name);}} style={{padding:14,borderRadius:10,border:"1px solid #e2e8f0",cursor:"pointer",background:i===0?"#fef3c7":"#fff"}} onMouseEnter={function(e){e.currentTarget.style.background="#f8fafc";}} onMouseLeave={function(e){e.currentTarget.style.background=i===0?"#fef3c7":"#fff";}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:14}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":"👤"}</span>
            <span style={{fontWeight:700,fontSize:14}}>{p.name}</span>
          </div>
          <div style={{fontSize:20,fontWeight:800,color:"#d97706"}}>{p.count} <span style={{fontSize:12,fontWeight:400,color:"#94a3b8"}}>ออเดอร์</span></div>
          <div style={{fontSize:12,color:"#64748b"}}>฿{p.sales.toLocaleString()}</div>
        </div>;})}
      </div>
    </div>}

    {/* ตารางแยกตามวัน */}
    {days.length===0?<div style={{background:"#fff",borderRadius:10,padding:40,textAlign:"center",color:"#94a3b8",border:"1px solid #e2e8f0"}}>{tab==="upsell"?"ไม่มี Upsell ในช่วงนี้":"ไม่มีออเดอร์ในช่วงนี้"}</div>
    :days.map(function(day){
      var isOpen=expandDate===day.date;
      return<div key={day.date} style={{background:"#fff",borderRadius:10,marginBottom:10,border:"1px solid #e2e8f0",overflow:"hidden"}}>
        <div onClick={function(){setExpandDate(isOpen?null:day.date);}} style={{display:"flex",alignItems:"center",padding:"12px 16px",cursor:"pointer",gap:12}} onMouseEnter={function(e){e.currentTarget.style.background="#f8fafc";}} onMouseLeave={function(e){e.currentTarget.style.background="";}}>
          <div style={{flex:1}}>
            <span style={{fontWeight:700,fontSize:14}}>{day.date}</span>
            <span style={{fontSize:12,color:"#94a3b8",marginLeft:10}}>{day.orders.length} ออเดอร์</span>
          </div>
          <span style={{fontSize:13,fontWeight:700}}>฿{day.sales.toLocaleString()}</span>
          <span style={{fontSize:12,color:"#ef4444",marginLeft:8}}>COD ฿{day.cod.toLocaleString()}</span>
          <span style={{fontSize:12,color:"#10b981",marginLeft:8}}>โอน ฿{day.transfer.toLocaleString()}</span>
          <span style={{fontSize:12,color:"#94a3b8",marginLeft:8}}>{isOpen?"▼":"▶"}</span>
        </div>
        {isOpen&&<div style={{borderTop:"1px solid #e2e8f0"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#f8fafc"}}>{["#","เวลา","ลูกค้า","เบอร์","ประเภท","ยอด","พนักงาน","หมายเหตุ"].map(function(h,i){return<th key={i} style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0"}}>{h}</th>;})}</tr></thead>
            <tbody>{day.orders.sort(function(a,b){return String(a.Timestamp||"").localeCompare(String(b.Timestamp||""));}).map(function(o,idx){var isCOD=Number(o.COD||0)>0;return<tr key={o.OrderID} style={{borderBottom:"1px solid #f1f5f9",borderLeft:isCOD?"3px solid #ef4444":"3px solid #10b981",cursor:"pointer"}} onClick={function(){setViewOrder(o);}} onMouseEnter={function(e){e.currentTarget.style.background="#f8fafc";}} onMouseLeave={function(e){e.currentTarget.style.background="";}}>
              <td style={{padding:"8px 12px",fontWeight:700,color:"#d97706",fontSize:11,textAlign:"center",minWidth:28}}>{idx+1}</td>
              <td style={{padding:"8px 12px",fontSize:11}}>{getTime(o.Timestamp)}</td>
              <td style={{padding:"8px 12px",fontWeight:600}}>{o.Name}</td>
              <td style={{padding:"8px 12px"}}>{o.MobileNo}</td>
              <td style={{padding:"8px 12px"}}><span style={{padding:"2px 8px",borderRadius:12,fontSize:10,fontWeight:700,background:isCOD?"#fef2f2":"#f0fdf4",color:isCOD?"#ef4444":"#10b981"}}>{isCOD?"COD":"โอน"}</span></td>
              <td style={{padding:"8px 12px",fontWeight:700}}>฿{Number(o.SalePrice||o.COD||0).toLocaleString()}</td>
              <td style={{padding:"8px 12px",fontSize:11}}>{o.SalesPerson}</td>
              <td style={{padding:"8px 12px",color:"#64748b",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.Remark}</td>
            </tr>;})}</tbody>
          </table>
        </div>}
      </div>;
    })}

    {viewOrder&&<DetailModal order={viewOrder} onClose={function(){setViewOrder(null);}} onDel={function(){}} onUploadSlip={function(){}} isAdmin={false}/>}
    })}
  </div>;
}


function TeamPage({accounts,onAdd,onToggle,onSaveUpsellBatch,onDel,onResetPw,onEditAcc}){var[show,setShow]=useState(false);var[nf,setNf]=useState({username:"",displayName:"",password:"",role:"user"});var[resetId,setResetId]=useState(null);var[newPw,setNewPw]=useState("");var[editAcc,setEditAcc]=useState(null);var[editSaving,setEditSaving]=useState(false);var[upsellEdit,setUpsellEdit]=useState(null);var[saving,setSaving]=useState(false);
  function handleAdd(){if(!nf.username||!nf.displayName||!nf.password){alert("กรอกให้ครบ");return;}onAdd({...nf,active:true}).then(function(ok){if(ok){setNf({username:"",displayName:"",password:"",role:"user"});setShow(false);}});}
  function startUE(){var c=[];accounts.forEach(function(a){if(a.canUpsell)c.push(a.username);});setUpsellEdit(c);}
  function toggleUE(u){setUpsellEdit(function(p){return p.indexOf(u)>=0?p.filter(function(x){return x!==u;}):p.concat([u]);});}
  function saveUE(){setSaving(true);onSaveUpsellBatch(upsellEdit).then(function(){setSaving(false);setUpsellEdit(null);});}
  return<div><div style={S.pageHeader}><h1 style={S.pageTitle}>👥 พนักงาน</h1></div>
    {resetId&&<div style={S.modalOverlay} onClick={function(){setResetId(null);}}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:380}} onClick={function(e){e.stopPropagation();}}><h3 style={{margin:"0 0 14px",fontWeight:700,fontSize:15}}>🔑 รีเซ็ต Password</h3><input type="password" value={newPw} onChange={function(e){setNewPw(e.target.value);}} placeholder="Password ใหม่" style={{...S.pInput,marginBottom:14}}/><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={function(){setResetId(null);}}>ยกเลิก</button><button style={S.submitBtn} onClick={function(){if(newPw.length<4){alert("4+ ตัว");return;}onResetPw(resetId,newPw);setResetId(null);setNewPw("");}}>บันทึก</button></div></div></div>}
    {editAcc&&<div style={S.modalOverlay} onClick={function(){setEditAcc(null);}}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:400}} onClick={function(e){e.stopPropagation();}}><h3 style={{margin:"0 0 16px",fontWeight:700,fontSize:15}}>✏️ แก้ไขบัญชี</h3><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}><div><label style={S.fLabel}>Email</label><input value={editAcc.username} onChange={function(e){setEditAcc({...editAcc,username:e.target.value});}} style={S.pInput}/></div><div><label style={S.fLabel}>ชื่อ</label><input value={editAcc.displayName} onChange={function(e){setEditAcc({...editAcc,displayName:e.target.value});}} style={S.pInput}/></div><div><label style={S.fLabel}>บทบาท</label><select value={editAcc.role} onChange={function(e){setEditAcc({...editAcc,role:e.target.value});}} style={S.pInput}><option value="user">พนักงาน</option><option value="admin">แอดมิน</option></select></div></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={function(){setEditAcc(null);}}>ยกเลิก</button><button style={S.submitBtn} disabled={editSaving} onClick={async function(){setEditSaving(true);var ok=await onEditAcc(editAcc.oldUsername,editAcc);setEditSaving(false);if(ok)setEditAcc(null);}}>บันทึก</button></div></div></div>}
    <div style={{background:"#fff",borderRadius:10,padding:20,marginBottom:16,border:"1px solid #e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{margin:0,fontSize:14,fontWeight:700}}>บัญชี {accounts.length} คน</h3><button onClick={function(){setShow(!show);}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:show?"#fef2f2":"#f8fafc",color:show?"#ef4444":"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}>{show?"✕":"＋ เพิ่ม"}</button></div>
      {show&&<div style={{padding:12,marginBottom:12,borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,alignItems:"end"}}><div><label style={S.fLabel}>Email</label><input value={nf.username} onChange={function(e){setNf({...nf,username:e.target.value});}} type="email" style={S.pInput}/></div><div><label style={S.fLabel}>ชื่อ</label><input value={nf.displayName} onChange={function(e){setNf({...nf,displayName:e.target.value});}} style={S.pInput}/></div><div><label style={S.fLabel}>Password</label><input type="password" value={nf.password} onChange={function(e){setNf({...nf,password:e.target.value});}} style={S.pInput}/></div><button onClick={handleAdd} style={{padding:"9px 14px",borderRadius:8,border:"none",background:"#d97706",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>เพิ่ม</button></div></div>}
      <div style={{borderTop:"1px solid #e2e8f0"}}>{accounts.map(function(a){var isAdm=a.role==="admin";return<div key={a.username} style={{display:"flex",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #f1f5f9",gap:8,opacity:a.active?1:.5}}><div style={{flex:1}}><span style={{fontWeight:600,fontSize:13}}>{a.displayName}</span> <span style={{fontSize:10,color:isAdm?"#92400e":"#64748b",background:isAdm?"#fef3c7":"#f1f5f9",padding:"1px 5px",borderRadius:3}}>{isAdm?"แอดมิน":"พนักงาน"}</span><div style={{fontSize:11,color:"#94a3b8"}}>{a.username}</div></div>
        <button onClick={function(){setEditAcc({oldUsername:a.username,username:a.username,displayName:a.displayName||"",role:a.role});}} style={{...S.sm,background:"#f8fafc",color:"#64748b",border:"1px solid #e2e8f0"}}>แก้ไข</button><button onClick={function(){setResetId(a.username);}} style={{...S.sm,background:"#f8fafc",color:"#64748b",border:"1px solid #e2e8f0"}}>🔑</button>
        {!isAdm&&<React.Fragment><button onClick={function(){onToggle(a.username);}} style={{...S.sm,background:"#f8fafc",color:a.active?"#f59e0b":"#10b981",border:"1px solid #e2e8f0"}}>{a.active?"ระงับ":"เปิด"}</button><button onClick={function(){if(confirm("ลบ?"))onDel(a.username);}} style={{...S.sm,background:"#fff",color:"#ef4444",border:"1px solid #fecaca"}}>ลบ</button></React.Fragment>}</div>;})}</div></div>
    <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h3 style={{margin:0,fontSize:14,fontWeight:700}}>🔥 สิทธิ์ Upsell</h3>{upsellEdit===null?<button onClick={startUE} style={{...S.sm,background:"#f8fafc",color:"#475569",border:"1px solid #e2e8f0"}}>แก้ไข</button>:<div style={{display:"flex",gap:6}}><button onClick={function(){setUpsellEdit(null);}} style={{...S.sm,background:"#fff",color:"#64748b",border:"1px solid #e2e8f0"}}>ยกเลิก</button><button onClick={saveUE} disabled={saving} style={{...S.sm,background:"#d97706",color:"#fff"}}>{saving?"⏳":"บันทึก"}</button></div>}</div>
      <div style={{borderTop:"1px solid #e2e8f0"}}>{accounts.map(function(a){var isOn=upsellEdit!==null?upsellEdit.indexOf(a.username)>=0:a.canUpsell;var ed=upsellEdit!==null;return<div key={a.username} onClick={ed?function(){toggleUE(a.username);}:undefined} style={{display:"flex",alignItems:"center",padding:"8px 12px",borderBottom:"1px solid #f1f5f9",cursor:ed?"pointer":"default",gap:8}}><div style={{width:16,height:16,borderRadius:3,border:isOn?"2px solid #ea580c":"2px solid #d1d5db",background:isOn?"#ea580c":"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff"}}>{isOn?"✓":""}</div><span style={{flex:1,fontSize:12,color:isOn?"#1e293b":"#94a3b8"}}>{a.displayName||a.username}</span><span style={{fontSize:11,color:isOn?"#ea580c":"#cbd5e1"}}>{isOn?"เปิด":"ปิด"}</span></div>;})}</div></div></div>;}

function ProductsPage({products,onAdd,onEdit,onDel}){var[show,setShow]=useState(false);var[brand,setBrand]=useState("");var[name,setName]=useState("");var[price,setPrice]=useState("");var[editP,setEditP]=useState(null);var[editSaving,setEditSaving]=useState(false);
  function getCats(){var c=[];(products||[]).forEach(function(p){var m=p.name.match(/^\[([^\]]+)\]/);var v=m?m[1]:"อื่นๆ";if(c.indexOf(v)<0)c.push(v);});return c;}var cats=getCats();
  return<div><div style={S.pageHeader}><h1 style={S.pageTitle}>🛒 สินค้า</h1></div>
    {editP&&<div style={S.modalOverlay} onClick={function(){setEditP(null);}}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:380}} onClick={function(e){e.stopPropagation();}}><h3 style={{margin:"0 0 14px",fontWeight:700,fontSize:15}}>✏️ แก้ไข</h3><div style={{marginBottom:10}}><label style={S.fLabel}>ชื่อ</label><input value={editP.name} onChange={function(e){setEditP({...editP,name:e.target.value});}} style={S.pInput}/></div><div style={{marginBottom:14}}><label style={S.fLabel}>ราคา</label><input value={editP.price} onChange={function(e){setEditP({...editP,price:e.target.value});}} type="number" style={S.pInput}/></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={function(){setEditP(null);}}>ยกเลิก</button><button style={S.submitBtn} disabled={editSaving} onClick={async function(){setEditSaving(true);var ok=await onEdit(editP.oldName,editP);setEditSaving(false);if(ok)setEditP(null);}}>บันทึก</button></div></div></div>}
    <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span style={{fontSize:13,color:"#64748b"}}>{(products||[]).length} รายการ</span><button onClick={function(){setShow(!show);}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:show?"#fef2f2":"#f8fafc",color:show?"#ef4444":"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}>{show?"✕":"＋ เพิ่ม"}</button></div>
      {show&&<div style={{padding:12,marginBottom:12,borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0"}}><div style={{display:"grid",gridTemplateColumns:"1fr 2fr 1fr auto",gap:8,alignItems:"end"}}><div><label style={S.fLabel}>กลุ่ม</label><select value={brand} onChange={function(e){setBrand(e.target.value);}} style={S.pInput}><option value="">เลือก</option>{cats.map(function(c){return<option key={c} value={c}>{c}</option>;})}<option value="__new">+ ใหม่</option></select></div><div><label style={S.fLabel}>ชื่อ</label><input value={name} onChange={function(e){setName(e.target.value);}} style={S.pInput}/></div><div><label style={S.fLabel}>ราคา</label><input value={price} onChange={function(e){setPrice(e.target.value);}} style={S.pInput}/></div><button onClick={async function(){if(!name)return;var b=brand;if(b==="__new"){b=prompt("กลุ่มใหม่:");if(!b)return;}if(!b)return;var ok=await onAdd({name:"["+b+"] "+name,price:price||0});if(ok){setName("");setPrice("");}}} style={{padding:"9px 14px",borderRadius:8,border:"none",background:"#d97706",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>เพิ่ม</button></div></div>}
      {cats.map(function(cat){var items=(products||[]).filter(function(p){var m=p.name.match(/^\[([^\]]+)\]/);return m?m[1]===cat:cat==="อื่นๆ";}).map(function(p){var m=p.name.match(/^\[([^\]]+)\]\s*(.*)/);return{name:p.name,short:m?m[2]:p.name,price:p.price};});return<div key={cat}><div style={{padding:"8px 12px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",fontSize:12,fontWeight:700,color:"#475569",display:"flex",justifyContent:"space-between"}}><span>{cat}</span><span style={{color:"#94a3b8",fontWeight:400}}>{items.length}</span></div>{items.map(function(p){return<div key={p.name} style={{display:"flex",alignItems:"center",padding:"8px 12px",borderTop:"1px solid #f1f5f9",fontSize:12,gap:8}}><div style={{flex:1}}>{p.short}</div><div style={{fontWeight:700,color:"#d97706",minWidth:60,textAlign:"right"}}>฿{p.price.toLocaleString()}</div><button onClick={function(){setEditP({oldName:p.name,name:p.name,price:String(p.price)});}} style={{...S.sm,background:"#f8fafc",color:"#64748b",border:"1px solid #e2e8f0"}}>แก้ไข</button><button onClick={function(){if(confirm("ลบ?"))onDel(p.name);}} style={{...S.sm,background:"#fff",color:"#ef4444",border:"1px solid #fecaca"}}>ลบ</button></div>;})}</div>;})}</div></div>;}

var S={app:{display:"block",minHeight:"100vh",fontFamily:"'Noto Sans Thai',sans-serif",background:"#f0f2f7",color:"#1e293b"},sidebar:{width:220,background:"linear-gradient(180deg,#1a1409,#422006)",color:"#fff",display:"flex",flexDirection:"column",flexShrink:0,position:"fixed",top:0,left:0,bottom:0,overflowY:"auto",overflowX:"hidden",zIndex:100},sidebarHead:{display:"flex",alignItems:"center",gap:10,padding:"20px 16px 12px",borderBottom:"1px solid rgba(255,255,255,.08)"},userCard:{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",margin:"10px 10px 0",background:"rgba(255,255,255,.06)",borderRadius:10},avatar:{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#d97706,#f59e0b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff"},nav:{display:"flex",flexDirection:"column",gap:3,padding:"16px 10px",flex:1},navItem:{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:8,border:"none",background:"transparent",color:"#fde68a",fontSize:13,fontWeight:500,cursor:"pointer",textAlign:"left"},navActive:{background:"rgba(255,255,255,.12)",color:"#fff",fontWeight:700},logoutBtn:{margin:"0 10px 16px",padding:10,border:"none",borderRadius:8,background:"rgba(239,68,68,.15)",color:"#fca5a5",fontSize:12,fontWeight:600,cursor:"pointer"},main:{marginLeft:220,padding:"24px 28px",minHeight:"100vh",width:"calc(100% - 220px)",boxSizing:"border-box"},pageHeader:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12},pageTitle:{fontSize:22,fontWeight:800,margin:0},addBtn:{padding:"10px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#d97706,#f59e0b)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"},searchBox:{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",flex:"1 1 200px"},searchInput:{border:"none",outline:"none",flex:1,fontSize:13,color:"#1e293b",background:"transparent"},table:{width:"100%",borderCollapse:"collapse",fontSize:13},th:{padding:"10px 14px",textAlign:"left",fontWeight:600,fontSize:11,color:"#64748b",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",whiteSpace:"nowrap"},td:{padding:"10px 14px",borderBottom:"1px solid #f1f5f9",verticalAlign:"middle"},fLabel:{fontSize:11,fontWeight:600,color:"#64748b",display:"block",marginBottom:3},pInput:{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",outline:"none",boxSizing:"border-box",background:"#fff"},cancelBtn:{padding:"10px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:13,fontWeight:600,cursor:"pointer"},submitBtn:{padding:"10px 20px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#d97706,#f59e0b)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"},sm:{padding:"5px 10px",borderRadius:6,border:"none",fontSize:11,fontWeight:600,cursor:"pointer"},modalOverlay:{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20},closeBtn:{width:32,height:32,borderRadius:"50%",border:"none",background:"#f1f5f9",color:"#475569",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},loginBg:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#1a1409,#422006,#92400e)",padding:20},loginCard:{background:"rgba(255,255,255,.97)",borderRadius:20,padding:"36px 32px",width:"100%",maxWidth:400,boxShadow:"0 25px 60px rgba(0,0,0,.3)"},notif:{position:"fixed",top:16,right:16,padding:"12px 20px",borderRadius:12,color:"#fff",fontWeight:600,fontSize:13,zIndex:2000,boxShadow:"0 8px 24px rgba(0,0,0,.2)",animation:"slideDown .3s"}};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

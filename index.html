async function syncToSheet(action,data){

  var payload=JSON.stringify({action:action,data:data});
  // วิธี 1: fetch POST (ลอง 3 ครั้ง)
  for(var attempt=0;attempt<3;attempt++){
    try{
      await fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:payload});
      return; // สำเร็จ
    }catch(e){

      if(attempt<2)await new Promise(function(r){setTimeout(r,2000);}); // รอ 2 วิ แล้วลองใหม่
    }
  }
  // วิธี 2: backup GET (ถ้า POST fail ทั้ง 3 ครั้ง)
  try{
    var params="action="+encodeURIComponent(action);
    var keys=Object.keys(data||{});
    for(var i=0;i<keys.length;i++){params+="&"+encodeURIComponent(keys[i])+"="+encodeURIComponent(String(data[keys[i]]||"").substring(0,200));}

    {re:/เซรั่ม\s*(\d+)/gi,name:"เซรั่ม"},
    {re:/สบู่\s*(\d+)/gi,name:"สบู่"},
    {re:/เอสเซน[ส์]*\s*(\d+)/gi,name:"เอสเซนส์"},
    {re:/ครีม\s*(\d+)/gi,name:"ครีม"},
    {re:/กันแดด\s*(\d+)/gi,name:"กันแดด"},
    {re:/โทนเนอร์\s*(\d+)/gi,name:"โทนเนอร์"},
    {re:/คลีน(?:ซิ่ง|ซิง)\s*(\d+)/gi,name:"คลีนซิ่ง"},

async function dbUpdateStatus(orderIds,status,table,onProgress){
  var t=table||"orders";var total=orderIds.length;var done=0;var fail=0;
  var batchSize=100;var batches=[];
  for(var b=0;b<total;b+=batchSize){batches.push(orderIds.slice(b,b+batchSize));}
  var concurrent=3;
  for(var i=0;i<batches.length;i+=concurrent){
    var chunk=batches.slice(i,i+concurrent);
    var results=await Promise.all(chunk.map(function(batch){
      var ids=batch.join(",");
      return sbFetch(t+"?order_id=in.("+ids+")",{method:"PATCH",body:{status:status}}).then(function(){return{ok:batch.length};}).catch(function(){return{fail:batch.length};});
    }));
    results.forEach(function(r){if(r.ok)done+=r.ok;else fail+=(r.fail||0);});
    if(onProgress)onProgress(done,total,fail);
  }
  return{done:done,fail:fail};
}

function exportCSV(orders,filename,table){

  var headerTH=["MobileNo*\nเบอร์มือถือ","Name\nชื่อ","Address\nที่อยู่","SubDistrict\nตำบล","District\nอำเภอ","ZIP\nรหัส ปณ.","Customer FB/Line\nเฟส/ไลน์ลูกค้า","SalesChannel\nช่องทางจำหน่าย","SalesPerson\nชื่อเล่น","StaffName\nชื่อจริง","AccountEmail\nอีเมลพนักงาน","SalePrice\nราคาขาย","COD*\nยอดเก็บเงินปลายทาง","Remark\nหมายเหตุ","PrevPromo\nโปรก่อนหน้า","Diff\nส่วนต่าง"];
  var csv="\uFEFF"+headerTH.map(function(h){return'"'+h.replace(/"/g,'""')+'"';}).join(",")+"\n";
  orders.forEach(function(o){
    var rm=String(o.Remark||"").replace(/\[PREV:\d+\]\s*/g,"");
    var pm=String(o.Remark||"").match(/\[PREV:(\d+)\]/);var prev=pm?Number(pm[1]):0;var diff=prev>0?(Number(o.SalePrice)||0)-prev:0;
    var row=[o.MobileNo||"",o.Name||"",o.Address||"",o.SubDistrict||"",o.District||"",o.ZIP||"",o.CustomerFBLine||"","CRM",o.SalesPerson||"",o.StaffName||"",o.AccountEmail||"",o.SalePrice||0,o.COD||0,rm,prev,diff];
    csv+=row.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",")+"\n";
  });
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename||"export.csv";a.click();
}

function doExportXLSX(orders,filename,table){
  var wb=new ExcelJS.Workbook();
  var ws=wb.addWorksheet("ProShip");

  // Column widths
  var cols=[{width:14},{width:12},{width:30},{width:18},{width:20},{width:10},{width:20},{width:14},{width:16},{width:18},{width:28},{width:12},{width:16},{width:22},{width:14},{width:14}];
  ws.columns=cols;

  // Row 1 — คำอธิบาย (merged)
  ws.mergeCells("A1:P1");
  var r1=ws.getCell("A1");
  r1.value="ช่องสีแดงต้องกรอก ช่องสีขาวไม่จำเป็น\nอำเภอ จังหวัด หากสกดผิด ระบบจะไม่นำเข้าให้\nเบอร์มือถือ ต้องครบ 10 หลัก ไม่สามารถใช้เบอร์ 02 ได้";
  r1.font={bold:true,size:10};
  r1.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFA5A5A5"}};
  r1.alignment={wrapText:true,vertical:"middle"};
  ws.getRow(1).height=42;

  // Row 2 — หัวตาราง
  var headers=["MobileNo*\nเบอร์มือถือ","Name\nชื่อ","Address\nที่อยู่","SubDistrict\nตำบล","District\nอำเภอ","ZIP\nรหัส ปณ.","Customer FB/Line\nเฟส/ไลน์ลูกค้า","SalesChannel\nช่องทางจำหน่าย","SalesPerson\nชื่อเล่น","StaffName\nชื่อจริง","AccountEmail\nอีเมลพนักงาน","SalePrice\nราคาขาย","COD*\nยอดเก็บเงินปลายทาง","Remark\nหมายเหตุ","PrevPromo\nโปรก่อนหน้า","Diff\nส่วนต่าง"];
  var redCols=[1,2,3,4,5,6,13]; // A,B,C,D,E,F,M = สีแดง (บังคับ)
  var row2=ws.getRow(2);
  headers.forEach(function(h,i){
    var cell=row2.getCell(i+1);
    cell.value=h;
    cell.font={bold:true,size:10};
    cell.alignment={wrapText:true,vertical:"middle",horizontal:"center"};
    cell.border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
    if(redCols.indexOf(i+1)>=0){
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFFFC7CE"}};
    }
  });
  row2.height=46;

  // Row 3+ — ข้อมูล
  orders.forEach(function(o){
    var rm=String(o.Remark||"").replace(/\[PREV:\d+\]\s*/g,"");
    var pm=String(o.Remark||"").match(/\[PREV:(\d+)\]/);var prev=pm?Number(pm[1]):0;var diff=prev>0?(Number(o.SalePrice)||0)-prev:0;
    var rowData=[
      String(o.MobileNo||""),o.Name||"",o.Address||"",o.SubDistrict||"",o.District||"",
      o.ZIP?Number(o.ZIP):0,o.CustomerFBLine||"","CRM",o.SalesPerson||"",o.StaffName||"",o.AccountEmail||"",
      Number(o.SalePrice)||0,Number(o.COD)||0,rm,prev,diff
    ];
    var dataRow=ws.addRow(rowData);
    dataRow.eachCell(function(cell,colNum){
      cell.border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
      cell.font={size:10};
      if(colNum===16&&cell.value!==0){cell.font={size:10,bold:true,color:{argb:cell.value>0?"FF10B981":"FFEF4444"}};}
    });
  });

  // Download
  wb.xlsx.writeBuffer().then(function(buf){
    var blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename||"export.xlsx";a.click();
  });
}

  var[importMode,setImportMode]=_s("today");
  var[importMonth,setImportMonth]=_s(todayVal.substring(0,7));
  var[importDateFrom,setImportDateFrom]=_s(todayVal);
  var[importDateTo,setImportDateTo]=_s(todayVal);
  var[form,setForm]=_s({date:todayVal,tracking_no:"",customer_name:"",phone:"",check_date:"",status:"รอเช็ค",telesale:"",cod:""});

  var teleNames=[];
  var nickToName={};
  (accounts||[]).forEach(function(a){
    var nick=extractNickname(a.displayName,a.nickname);
    if(nick&&teleNames.indexOf(nick)<0)teleNames.push(nick);
    if(nick)nickToName[nick]=extractRealName(a.displayName);
  });

  var myNickname=extractNickname(user.displayName,user.nickname);
  var myParcels=isAdmin?(parcels||[]):(parcels||[]).filter(function(p){return p.telesale===myNickname;});

  var filtered=myParcels.filter(function(p){
    var ms=!search||String(p.tracking_no||"").indexOf(search)>=0||String(p.customer_name||"").indexOf(search)>=0||String(p.phone||"").indexOf(search)>=0;
    var mst=filterStatus==="ทั้งหมด"||filterStatus==="ว่างเปล่า"?(!p.flash_status&&filterStatus==="ว่างเปล่า")||(filterStatus==="ทั้งหมด"):p.flash_status===filterStatus;
    var mt=filterTele==="ทั้งหมด"||p.telesale===filterTele;
    var md=true;
    if(filterDateMode!=="all"){
      var d=p.date||"";
      if(filterDateMode==="today")md=d===todayVal;
      else if(filterDateMode==="yesterday"){var yd=new Date();yd.setDate(yd.getDate()-1);md=d===yd.getFullYear()+"-"+String(yd.getMonth()+1).padStart(2,"0")+"-"+String(yd.getDate()).padStart(2,"0");}
      else if(filterDateMode==="7days")md=d>=sevenDaysAgo();
      else if(filterDateMode==="month")md=d.substring(0,7)===filterMonth;
      else if(filterDateMode==="range")md=d>=filterDateFrom&&d<=filterDateTo;
    }
    return ms&&mst&&mt&&md;
  });

  var summary={total:filtered.length,confirmed:filtered.filter(function(p){return p.flash_status==="เซ็นรับแล้ว"||p.flash_status==="ลูกค้ารับของ";}).length,pending:filtered.filter(function(p){return!p.flash_status||p.flash_status==="สร้างรายการ"||p.flash_status==="รับพัสดุแล้ว"||p.flash_status==="รับเข้าระบบ";}).length,returned:filtered.filter(function(p){return p.flash_status==="ส่งคืน"||p.flash_status==="คืนสำเร็จ"||p.flash_status==="คืนต้นทาง"||p.flash_status==="จัดส่งไม่สำเร็จ";}).length,totalCOD:filtered.filter(function(p){return p.flash_status==="เซ็นรับแล้ว"||p.flash_status==="ลูกค้ารับของ";}).reduce(function(s,p){return s+(Number(p.cod)||0);},0)};

  // --- Import logic (lazy — คำนวณตอนเปิด modal เท่านั้น) ---
  var[importData,setImportData]=_s([]);

  // --- ดึงพัสดุ manual only ---
  var[syncing,setSyncing]=_s(false);
  var[pullCounts,setPullCounts]=_s(null);

  async function checkNewParcels(){
    var tracks=await dbGetParcelTrackings();
    var ex={};tracks.forEach(function(t){if(t)ex[t]=true;});
    var myO=(allOrders||[]).concat(upsellOrders||[]);
    if(!isAdmin){myO=myO.filter(function(o){return o.AccountEmail===user.username;});}
    var newAll=myO.filter(function(o){return o.TrackingNo&&o.TrackingNo.length>3&&!ex[o.TrackingNo];});
    var today=newAll.filter(function(o){return getDate(o.Timestamp)===todayVal;});
    var recent=newAll.filter(function(o){var d=getDate(o.Timestamp);return d>=sevenDaysAgo();});
    setPullCounts({today:today.length,recent:recent.length,total:tracks.length});
    setImportData(newAll);
    return{newAll:newAll,today:today,recent:recent};
  }

  useEffect(function(){if(allOrders&&allOrders.length>0){checkNewParcels();}},[allOrders,upsellOrders]);

  async function pullParcels(mode){
    setSyncing(true);
    var data=await checkNewParcels();
    var list=mode==="today"?data.today:data.recent;
    var label=mode==="today"?"(วันนี้)":"(7 วัน)";
    if(list.length===0){setSyncing(false);notify("ไม่มีพัสดุใหม่","warning");return;}
    var rows=list.map(function(o){return{date:getDate(o.Timestamp)||todayVal,tracking_no:o.TrackingNo,customer_name:o.Name||"",phone:o.MobileNo||"",check_date:"",status:"รอเช็ค",telesale:o.SalesPerson||extractNickname(user.displayName,user.nickname),cod:Number(o.COD)||0};});
    var ok=await dbAddParcelBatch(rows);
    setSyncing(false);
    if(ok>0){notify("📥 ดึงสำเร็จ "+ok+" รายการ "+label);onRefresh();checkNewParcels();}else{notify("ดึงไม่สำเร็จ","warning");}
  }

  // --- Flash Sync ---
  var[flashSyncing,setFlashSyncing]=_s(false);
  var[flashProgress,setFlashProgress]=_s("");
  var syncingRef=useRef(false);

  async function syncFlashStatus(silent){
    if(syncingRef.current)return;
    syncingRef.current=true;
    setFlashSyncing(true);
    try{
      var res=await fetch(FLASH_WORKER+"/sync");
      var data=await res.json();
      if(!silent)notify("🔄 ซิงค์ Flash เสร็จ — อัปเดต "+data.updated+" รายการ (เช็ค "+data.checked+")");
      onRefresh();
    }catch(e){
      if(!silent)notify("❌ sync ผิดพลาด: "+e.message,"warning");
    }
    syncingRef.current=false;
    setFlashSyncing(false);setFlashProgress("");
  }

  // Real-time sync: เปิดหน้า + ทุก 3 นาที (Worker ใช้เวลา ~100 วิ/รอบ)
  var autoSyncDone=useRef(false);
  useEffect(function(){
    if(myParcels.length>0&&!autoSyncDone.current){
      autoSyncDone.current=true;
      syncFlashStatus(true);
    }
    var iv=setInterval(function(){
      syncFlashStatus(true);
    },180000);
    return function(){clearInterval(iv);};
  },[myParcels.length]);

  var importList=importData.filter(function(o){
    var d=getDate(o.Timestamp);
    if(importMode==="today")return d===todayVal;
    if(importMode==="month")return d&&d.substring(0,7)===importMonth;
    if(importMode==="range")return d&&d>=importDateFrom&&d<=importDateTo;
    return true;
  });

  function openImport(){
    checkNewParcels();
    setImportMode("today");setImportMonth(todayVal.substring(0,7));
    setImportDateFrom(todayVal);setImportDateTo(todayVal);
    var sel={};importData.filter(function(o){return getDate(o.Timestamp)===todayVal;}).forEach(function(o){sel[o.TrackingNo]=true;});
    setImportSel(sel);setShowImport(true);
  }
  function onImportModeChange(mode){
    setImportMode(mode);
    var list=importData.filter(function(o){
      var d=getDate(o.Timestamp);
      if(mode==="today")return d===todayVal;
      if(mode==="month")return d&&d.substring(0,7)===importMonth;
      if(mode==="range")return d&&d>=importDateFrom&&d<=importDateTo;
      return true;
    });
    var sel={};list.forEach(function(o){sel[o.TrackingNo]=true;});setImportSel(sel);
  }
  function refreshImportSel(){
    var sel={};importList.forEach(function(o){sel[o.TrackingNo]=true;});setImportSel(sel);
  }
  async function doImport(){
    var selected=importList.filter(function(o){return importSel[o.TrackingNo];});
    if(selected.length===0){notify("กรุณาเลือกพัสดุ","warning");return;}
    setImporting(true);
    var rows=selected.map(function(o){return{date:getDate(o.Timestamp)||todayVal,tracking_no:o.TrackingNo,customer_name:o.Name||"",phone:o.MobileNo||"",check_date:"",status:"รอเช็ค",telesale:o.SalesPerson||extractNickname(user.displayName,user.nickname),cod:Number(o.COD)||0};});
    var ok=await dbAddParcelBatch(rows);
    setImporting(false);setShowImport(false);
    notify("✅ ดึงพัสดุสำเร็จ "+ok+" รายการ");
    onRefresh();
  }
  function toggleImportAll(checked){var s={};importList.forEach(function(o){s[o.TrackingNo]=checked;});setImportSel(s);}

  function openAdd(){setForm({date:todayVal,tracking_no:"",customer_name:"",phone:"",check_date:"",status:"รอเช็ค",telesale:extractNickname(user.displayName,user.nickname),cod:""});setEditId(null);setShowModal(true);}
  function openEdit(p){setForm({date:p.date||"",tracking_no:p.tracking_no||"",customer_name:p.customer_name||"",phone:p.phone||"",check_date:p.check_date||"",status:p.status||"รอเช็ค",telesale:p.telesale||"",cod:String(p.cod||"")});setEditId(p.id);setShowModal(true);}
  async function save(){
    if(!form.tracking_no||!form.customer_name){notify("กรุณากรอก เลขพัสดุ และ ชื่อลูกค้า","warning");return;}
    try{
      if(editId){
        await dbEditParcel(editId,form);
        // Optimistic update
        setParcels(function(prev){return prev.map(function(p){return p.id===editId?{...p,...form,cod:Number(form.cod)||0}:p;});});
        notify("✅ แก้ไขสำเร็จ");
      }else{
        await dbAddParcel(form);notify("✅ เพิ่มพัสดุสำเร็จ");onRefresh();
      }
      setShowModal(false);
    }catch(e){notify("❌ "+String(e.message||e),"warning");}
  }
  async function handleDel(id){if(!confirm("ลบรายการนี้?"))return;try{await dbDeleteParcel(id);setParcels(function(prev){return prev.filter(function(p){return p.id!==id;});});notify("ลบสำเร็จ");}catch(e){notify("ลบผิดพลาด","warning");}}
  async function quickStatus(id,st){
    var actualSt=st===" "?"":st;
    // Optimistic update — เปลี่ยน UI ทันที
    setParcels(function(prev){return prev.map(function(p){return p.id===id?{...p,status:actualSt,check_date:actualSt?todayVal:""}:p;});});
    try{
      await sbFetch("parcel_checks?id=eq."+id,{method:"PATCH",body:{status:actualSt,check_date:actualSt?todayVal:""}});
      notify("✅ → "+(actualSt||"ว่างเปล่า"));
    }catch(e){
      notify("❌ เปลี่ยนสถานะไม่สำเร็จ","warning");
      onRefresh();
    }
  }
  function fmtDate(d){if(!d)return"-";try{var dt=new Date(d);return dt.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"2-digit"});}catch(e){return d;}}

  var cardS={flex:"1 1 140px",background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 1px 3px rgba(0,0,0,.06)"};
  var cardLabel={fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:.5};
  var cardVal={fontSize:24,fontWeight:800};

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1e293b"}}>📦 เช็คพัสดุ</h2>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {isAdmin&&<button disabled={flashSyncing} onClick={function(){syncFlashStatus(false);}} style={{padding:"10px 20px",borderRadius:10,border:"none",background:flashSyncing?"#94a3b8":"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",fontWeight:700,fontSize:14,cursor:flashSyncing?"not-allowed":"pointer",boxShadow:"0 2px 8px rgba(37,99,235,.3)"}}>{flashSyncing?"⏳ กำลังซิงค์...":"🔄 ซิงค์ Flash"}</button>}
        <button onClick={openAdd} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#d97706,#f59e0b)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 2px 8px rgba(217,119,6,.3)"}}>+ เพิ่มพัสดุ</button>
        <button onClick={openImport} style={{padding:"10px 20px",borderRadius:10,border:"2px solid #d97706",background:"transparent",color:"#d97706",fontWeight:700,fontSize:14,cursor:"pointer"}}>📥 ดึงพัสดุของฉัน</button>
      </div>
    </div>

    {/* Summary */}
    <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{...cardS,borderLeft:"4px solid #3b82f6"}}><div style={cardLabel}>ทั้งหมด</div><div style={{...cardVal,color:"#1e293b"}}>{summary.total}</div></div>
      <div style={{...cardS,borderLeft:"4px solid #10b981"}}><div style={cardLabel}>เซ็นรับแล้ว</div><div style={{...cardVal,color:"#10b981"}}>{summary.confirmed}</div></div>
      <div style={{...cardS,borderLeft:"4px solid #f59e0b"}}><div style={cardLabel}>รอจัดส่ง</div><div style={{...cardVal,color:"#f59e0b"}}>{summary.pending}</div></div>
      <div style={{...cardS,borderLeft:"4px solid #ef4444"}}><div style={cardLabel}>ส่งคืน/ตีกลับ</div><div style={{...cardVal,color:"#ef4444"}}>{summary.returned}</div></div>
      <div style={{...cardS,borderLeft:"4px solid #8b5cf6"}}><div style={cardLabel}>ยอด COD</div><div style={{...cardVal,color:"#8b5cf6"}}>฿{summary.totalCOD.toLocaleString()}</div></div>
      {summary.total>0&&(function(){var rr=Math.round(summary.returned/summary.total*100);var rrColor=rr>=20?"#dc2626":rr>=10?"#f59e0b":"#10b981";var rrBg=rr>=20?"#fef2f2":rr>=10?"#fefce8":"#f0fdf4";var rrBorder=rr>=20?"#ef4444":rr>=10?"#f59e0b":"#10b981";return<div style={{...cardS,borderLeft:"4px solid "+rrBorder,background:rrBg,minWidth:140}}>
        <div style={cardLabel}>อัตราตีกลับ</div>
        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
          <div style={{fontSize:28,fontWeight:800,color:rrColor}}>{rr}%</div>
          <div style={{fontSize:11,color:"#64748b"}}>{summary.returned}/{summary.total}</div>
        </div>
        <div style={{width:"100%",height:6,background:"#e2e8f0",borderRadius:4,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",width:rr+"%",background:rrColor,borderRadius:4}}/></div>
      </div>;})()}
    </div>

    {/* แจ้งเตือนอัตราตีกลับ */}
    {summary.total>0&&summary.returned>0&&(function(){
      var returnRate=Math.round(summary.returned/summary.total*100);
      var returnCOD=filtered.filter(function(p){return p.flash_status==="ส่งคืน"||p.flash_status==="คืนสำเร็จ";}).reduce(function(s,p){return s+(Number(p.cod)||0);},0);
      return<div style={{background:"linear-gradient(135deg,#fef2f2,#fff1f2)",borderRadius:12,padding:"14px 20px",marginBottom:16,border:"2px solid #fca5a5",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div style={{fontSize:28}}>⚠️</div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:800,color:"#dc2626"}}>อัตราตีกลับ {returnRate}%</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>ส่งคืน/ตีกลับ <b style={{color:"#dc2626"}}>{summary.returned}</b> จาก {summary.total} รายการ · COD สูญเสีย <b style={{color:"#dc2626"}}>฿{returnCOD.toLocaleString()}</b></div>
        </div>
        <div style={{textAlign:"center",padding:"8px 16px",borderRadius:10,background:"#dc2626",color:"#fff"}}>
          <div style={{fontSize:22,fontWeight:800}}>{returnRate}%</div>
          <div style={{fontSize:9,fontWeight:600}}>ตีกลับ</div>
        </div>
      </div>;
    })()}

    {flashProgress&&<div style={{background:"linear-gradient(135deg,#eff6ff,#dbeafe)",borderRadius:10,padding:"10px 16px",marginBottom:12,border:"1px solid #93c5fd",display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid #0284c7",borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
      <span style={{fontSize:13,fontWeight:600,color:"#0c4a6e"}}>{flashProgress}</span>
    </div>}

    {/* Date Filter */}
    <div style={{background:"#fff",borderRadius:10,padding:"12px 16px",marginBottom:12,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>📅 ช่วงเวลา:</span>
        {[{k:"all",l:"ทั้งหมด"},{k:"today",l:"วันนี้"},{k:"yesterday",l:"เมื่อวาน"},{k:"7days",l:"7 วัน"},{k:"month",l:"เลือกเดือน"},{k:"range",l:"ระบุวัน"}].map(function(m){
          return<button key={m.k} onClick={function(){setFilterDateMode(m.k);setCurrentPage(1);}} style={{padding:"6px 14px",borderRadius:8,border:filterDateMode===m.k?"2px solid #d97706":"1px solid #e2e8f0",background:filterDateMode===m.k?"#fef3c7":"#fff",color:filterDateMode===m.k?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{m.l}</button>;
        })}
        {filterDateMode==="month"&&<input type="month" value={filterMonth} onChange={function(e){setFilterMonth(e.target.value);}} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"inherit"}}/>}
        {filterDateMode==="range"&&<div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input type="date" value={filterDateFrom} onChange={function(e){setFilterDateFrom(e.target.value);}} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"inherit"}}/>
          <span style={{fontSize:12,color:"#64748b"}}>ถึง</span>
          <input type="date" value={filterDateTo} onChange={function(e){setFilterDateTo(e.target.value);}} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"inherit"}}/>
        </div>}
        {filterDateMode!=="all"&&<span style={{fontSize:11,color:"#d97706",fontWeight:600}}>({filtered.length} รายการ)</span>}
      </div>
    </div>

    {/* Filters */}
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <input placeholder="🔍 ค้นหา เลขพัสดุ/ชื่อ/เบอร์..." value={search} onChange={function(e){setSearch(e.target.value);setCurrentPage(1);}} style={{flex:"1 1 200px",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}/>
      <select value={filterStatus} onChange={function(e){setFilterStatus(e.target.value);setCurrentPage(1);}} style={{padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,background:"#fff",cursor:"pointer",fontFamily:"inherit"}}>
        <option>ทั้งหมด</option>
        <option>สร้างรายการ</option>
        <option>รับพัสดุแล้ว</option>
        <option>อยู่ในระบบขนส่ง</option>
        <option>กำลังจัดส่ง</option>
        <option>เซ็นรับแล้ว</option>
        <option>ส่งคืน</option>
        <option>คืนสำเร็จ</option>
        <option>ไม่พบข้อมูล</option>
        <option>ว่างเปล่า</option>
      </select>
      <select value={filterTele} onChange={function(e){setFilterTele(e.target.value);setCurrentPage(1);}} style={{padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,background:"#fff",cursor:"pointer",fontFamily:"inherit"}}>
        <option>ทั้งหมด</option>
        {teleNames.map(function(t){return<option key={t}>{t}</option>;})}
      </select>
      <button onClick={onRefresh} style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>🔄</button>
    </div>

    {/* Table */}
    <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:860}}>
        <thead><tr>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>#</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>วันที่</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>เลขพัสดุ</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>ชื่อลูกค้า</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>เบอร์โทร</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>วันเช็ค</th>
          <th style={{background:"#f8fafc",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0284c7",borderBottom:"2px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>สถานะ Flash</th>

/* ===== PARCEL REPORT — หน้าหัวหน้า ===== */
function ParcelReportPage({parcels,accounts,user}){
  var _s=useState;
  var[dateFrom,setDateFrom]=_s(monthStart());
  var[dateTo,setDateTo]=_s(todayStr());
  var[selPerson,setSelPerson]=_s("ALL");
  var[selStatus,setSelStatus]=_s("ALL");
  var[expandPerson,setExpandPerson]=_s(null);
  var[flashSync,setFlashSync]=_s(null);

  // ดึงสถานะ Flash Sync ทุก 30 วินาที
  useEffect(function(){
    function fetchSync(){
      fetch("https://flash-proxy.themtja.workers.dev/status").then(function(r){return r.json();}).then(function(d){setFlashSync(d);}).catch(function(){});}
    fetchSync();
    var iv=setInterval(fetchSync,30000);
    return function(){clearInterval(iv);};
  },[]);

  var teleNames=[];var nickMap={};
  (accounts||[]).forEach(function(a){
    var nick=extractNickname(a.displayName,a.nickname);
    if(nick&&teleNames.indexOf(nick)<0)teleNames.push(nick);
    if(a.nickname)nickMap[a.displayName]=a.nickname;
  });

  // กรองตามวันที่ + คน (ไม่กรองสถานะ — ใช้แสดงจำนวนปุ่ม)
  var preFiltered=(parcels||[]).filter(function(p){
    var d=p.date||"";
    if(!d||d.length<10||d[4]!=="-")return false;
    var ymd=d.substring(0,10);
    if(ymd<dateFrom||ymd>dateTo)return false;
    if(selPerson!=="ALL"&&p.telesale!==selPerson)return false;
    return true;
  });
  // กรองตามวันที่ + คน + สถานะ Flash
  var FLASH_STATS=["สร้างรายการ","รับพัสดุแล้ว","อยู่ในระบบขนส่ง","กำลังจัดส่ง","เซ็นรับแล้ว","ส่งคืน","คืนสำเร็จ"];
  var filtered=selStatus==="ALL"?preFiltered:selStatus===""?preFiltered.filter(function(p){return!p.flash_status;}):preFiltered.filter(function(p){return p.flash_status===selStatus;});

  // --- สรุปรวม ---
  var total=filtered.length;
  var byStatus={};FLASH_STATS.forEach(function(s){byStatus[s]=0;});byStatus[""]=0;
  var byStatusAll={};FLASH_STATS.forEach(function(s){byStatusAll[s]=0;});byStatusAll[""]=0;
  var totalCOD=0;var codConfirmed=0;
  filtered.forEach(function(p){
    var st=p.flash_status||"";
    if(byStatus[st]!==undefined)byStatus[st]++;else byStatus[""]++;
    var cod=Number(p.cod)||0;totalCOD+=cod;
    if(p.flash_status==="เซ็นรับแล้ว")codConfirmed+=cod;
  });
  preFiltered.forEach(function(p){var st=p.flash_status||"";if(byStatusAll[st]!==undefined)byStatusAll[st]++;else byStatusAll[""]++;});
  var successRate=total>0?Math.round((byStatus["เซ็นรับแล้ว"]||0)/total*100):0;
  var deliveryRate=total>0?Math.round(((byStatus["เซ็นรับแล้ว"]||0)+(byStatus["กำลังจัดส่ง"]||0))/total*100):0;

  // --- สรุปแต่ละคน ---
  var personMap={};
  filtered.forEach(function(p){
    var t=p.telesale||"ไม่ระบุ";
    if(!personMap[t])personMap[t]={name:t,total:0,confirmed:0,delivering:0,inTransit:0,returned:0,pending:0,cod:0,codOk:0};
    var pm=personMap[t];pm.total++;pm.cod+=Number(p.cod)||0;
    if(p.flash_status==="เซ็นรับแล้ว"){pm.confirmed++;pm.codOk+=Number(p.cod)||0;}
    if(p.flash_status==="กำลังจัดส่ง")pm.delivering++;
    if(p.flash_status==="อยู่ในระบบขนส่ง"||p.flash_status==="รับพัสดุแล้ว")pm.inTransit++;
    if(p.flash_status==="ส่งคืน"||p.flash_status==="คืนสำเร็จ")pm.returned++;
    if(!p.flash_status||p.flash_status==="สร้างรายการ")pm.pending++;
  });
  var personList=Object.values(personMap).sort(function(a,b){return b.total-a.total;});

  // --- รายวัน ---
  var dayMap={};
  filtered.forEach(function(p){
    var d=p.date||"?";
    if(!dayMap[d])dayMap[d]={date:d,total:0,confirmed:0,pending:0,cod:0};
    dayMap[d].total++;
    if(p.flash_status==="เซ็นรับแล้ว"){dayMap[d].confirmed++;dayMap[d].cod+=Number(p.cod)||0;}
    if(!p.flash_status||p.flash_status==="สร้างรายการ"||p.flash_status==="รับพัสดุแล้ว")dayMap[d].pending++;
  });
  var dayList=Object.values(dayMap).sort(function(a,b){return b.date>a.date?1:-1;});

  function fmtDate(d){if(!d||d==="?")return"-";try{var dt=new Date(d);return dt.toLocaleDateString("th-TH",{day:"2-digit",month:"short"});}catch(e){return d;}}
  function pct(n,t){return t>0?Math.round(n/t*100):0;}

  var cardS={background:"#fff",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 3px rgba(0,0,0,.06)"};
  var thS={padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",background:"#f8fafc",whiteSpace:"nowrap"};
  var tdS={padding:"10px 12px",borderBottom:"1px solid #f1f5f9",fontSize:12};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1e293b"}}>👑 รายงานหัวหน้า — เช็คพัสดุ</h2>
    </div>

    {/* Flash Sync Status */}
    {flashSync&&<div style={{background:flashSync.remaining>0?"linear-gradient(135deg,#eff6ff,#dbeafe)":"linear-gradient(135deg,#f0fdf4,#dcfce7)",borderRadius:10,padding:"12px 18px",marginBottom:16,border:"1px solid "+(flashSync.remaining>0?"#93c5fd":"#86efac"),display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      {flashSync.remaining>0?<>
        <div style={{width:18,height:18,borderRadius:"50%",border:"2.5px solid #3b82f6",borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1e40af"}}>🔄 Flash Sync กำลังทำงาน</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>เหลือ <b style={{color:"#d97706"}}>{flashSync.remaining}</b> รายการ · ซิงค์แล้ว <b style={{color:"#059669"}}>{flashSync.synced||0}</b> รายการ · ทุก 5 นาที</div>
          {flashSync.newest_pending&&<div style={{fontSize:11,color:"#64748b",marginTop:2}}>📅 รอซิงค์: <b>{flashSync.oldest_pending}</b> ถึง <b>{flashSync.newest_pending}</b></div>}
        </div>
        <div style={{textAlign:"center",padding:"6px 14px",borderRadius:8,background:"#3b82f6",color:"#fff"}}>
          <div style={{fontSize:18,fontWeight:800}}>{flashSync.remaining}</div>
          <div style={{fontSize:8,fontWeight:600}}>รอซิงค์</div>
        </div>
      </>:<>
        <div style={{fontSize:20}}>✅</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#059669"}}>Flash Sync เสร็จสมบูรณ์</div>
          <div style={{fontSize:12,color:"#64748b"}}>ซิงค์แล้ว <b style={{color:"#059669"}}>{flashSync.synced||0}</b> รายการ · สถานะพัสดุทุกตัวอัพเดตแล้ว</div>
        </div>
      </>}
    </div>}

    {/* ตัวกรอง */}
    <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>จาก</span>
        <input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13}}/>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>ถึง</span>
        <input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13}}/>
        <button onClick={function(){setDateFrom(todayStr());setDateTo(todayStr());}} style={dateBtnStyle(dateFrom===todayStr()&&dateTo===todayStr())}>วันนี้</button>
        <button onClick={function(){var y=new Date();y.setDate(y.getDate()-1);var ys=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");setDateFrom(ys);setDateTo(ys);}} style={dateBtnStyle(false)}>เมื่อวาน</button>
        <button onClick={function(){setDateFrom(sevenDaysAgo());setDateTo(todayStr());}} style={dateBtnStyle(dateFrom===sevenDaysAgo()&&dateTo===todayStr())}>7 วัน</button>
        <button onClick={function(){setDateFrom(monthStart());setDateTo(todayStr());}} style={dateBtnStyle(dateFrom===monthStart()&&dateTo===todayStr())}>เดือนนี้</button>
        <button onClick={function(){setDateFrom(prevMonthStart());setDateTo(prevMonthEnd());}} style={dateBtnStyle(dateFrom===prevMonthStart()&&dateTo===prevMonthEnd())}>เดือนก่อน</button>
        <button onClick={function(){setDateFrom("2020-01-01");setDateTo(todayStr());}} style={dateBtnStyle(dateFrom==="2020-01-01"&&dateTo===todayStr())}>ทั้งหมด</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>TeleSale:</span>
        <button onClick={function(){setSelPerson("ALL");}} style={{padding:"6px 14px",borderRadius:8,border:selPerson==="ALL"?"2px solid #d97706":"1px solid #e2e8f0",background:selPerson==="ALL"?"#fef3c7":"#fff",color:selPerson==="ALL"?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>ทุกคน</button>
        {teleNames.map(function(n){var active=selPerson===n;var pm=personMap[n];return<button key={n} onClick={function(){setSelPerson(n);}} style={{padding:"6px 14px",borderRadius:8,border:active?"2px solid #d97706":"1px solid #e2e8f0",background:active?"#fef3c7":"#fff",color:active?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{n} {pm?<span style={{fontSize:10,color:"#94a3b8"}}>({pm.total})</span>:""}</button>;})}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginTop:10}}>
        <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>สถานะ:</span>
        <button onClick={function(){setSelStatus("ALL");}} style={{padding:"6px 14px",borderRadius:8,border:selStatus==="ALL"?"2px solid #d97706":"1px solid #e2e8f0",background:selStatus==="ALL"?"#fef3c7":"#fff",color:selStatus==="ALL"?"#92400e":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>ทั้งหมด</button>
        {FLASH_STATS.map(function(sv){var active=selStatus===sv;var count=byStatusAll[sv]||0;var st=FLASH_STATUS_STYLES[sv]||{c:"#94a3b8",bg:"#f1f5f9"};return<button key={sv} onClick={function(){setSelStatus(sv);}} style={{padding:"6px 14px",borderRadius:8,border:active?"2px solid "+st.c:"1px solid #e2e8f0",background:active?st.bg:"#fff",color:active?st.c:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}><span style={{color:st.c}}>{sv}</span> <span style={{fontSize:10,color:"#94a3b8"}}>({count})</span></button>;})}
        <button onClick={function(){setSelStatus("");}} style={{padding:"6px 14px",borderRadius:8,border:selStatus===""?"2px solid #cbd5e1":"1px solid #e2e8f0",background:selStatus===""?"#f1f5f9":"#fff",color:selStatus===""?"#475569":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}><span style={{color:"#94a3b8"}}>ว่างเปล่า</span> <span style={{fontSize:10,color:"#94a3b8"}}>({byStatusAll[""]||0})</span></button>
      </div>
    </div>

    {/* สรุปภาพรวม */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:16}}>
      <div style={{...cardS,borderLeft:"4px solid #3b82f6"}}><div style={{fontSize:28,fontWeight:800,color:"#1e293b"}}>{total}</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>พัสดุทั้งหมด</div></div>
      <div style={{...cardS,borderLeft:"4px solid #10b981"}}><div style={{fontSize:28,fontWeight:800,color:"#10b981"}}>{successRate}%</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>อัตราเซ็นรับ</div></div>
      <div style={{...cardS,borderLeft:"4px solid #0ea5e9"}}><div style={{fontSize:28,fontWeight:800,color:"#0ea5e9"}}>{deliveryRate}%</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>อัตราจัดส่ง</div></div>
      <div style={{...cardS,borderLeft:"4px solid #8b5cf6"}}><div style={{fontSize:28,fontWeight:800,color:"#8b5cf6"}}>฿{codConfirmed.toLocaleString()}</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>COD เซ็นรับแล้ว</div></div>
      <div style={{...cardS,borderLeft:"4px solid #f59e0b"}}><div style={{fontSize:28,fontWeight:800,color:"#f59e0b"}}>{(byStatus["สร้างรายการ"]||0)+(byStatus["รับพัสดุแล้ว"]||0)}</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>รอจัดส่ง</div></div>
      <div style={{...cardS,borderLeft:"4px solid #ef4444"}}><div style={{fontSize:28,fontWeight:800,color:"#ef4444"}}>{(byStatus["ส่งคืน"]||0)+(byStatus["คืนสำเร็จ"]||0)}</div><div style={{fontSize:11,color:"#64748b",fontWeight:600}}>ส่งคืน+ตีกลับ</div></div>
    </div>

    {/* กราฟสถานะ */}
    <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📊 สัดส่วนสถานะ</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {FLASH_STATS.map(function(sv){
          var count=byStatus[sv]||0;var w=total>0?Math.max(count/total*100,count>0?2:0):0;
          var st=FLASH_STATUS_STYLES[sv]||{c:"#94a3b8",bg:"#f1f5f9"};
          return<div key={sv} style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:100,fontSize:12,fontWeight:600,color:st.c,textAlign:"right"}}>{sv}</div>
            <div style={{flex:1,height:24,background:"#f1f5f9",borderRadius:6,overflow:"hidden",position:"relative"}}>
              <div style={{height:"100%",width:w+"%",background:st.c,borderRadius:6,transition:"width .4s"}}/>
              {count>0&&<span style={{position:"absolute",left:w>15?(w/2)+"%":"calc("+w+"% + 6px)",top:"50%",transform:w>15?"translate(-50%,-50%)":"translateY(-50%)",fontSize:11,fontWeight:700,color:w>15?"#fff":st.c}}>{count} ({Math.round(w)}%)</span>}
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* จัดอันดับพนักงาน */}
    {personList.length>0&&(function(){
      var ranked=personList.slice().map(function(p){var rate=pct(p.confirmed,p.total);var failRate=pct(p.returned,p.total);return{...p,rate:rate,failRate:failRate};}).sort(function(a,b){return b.rate-a.rate||b.codOk-a.codOk;});
      var best=ranked[0];var worst=ranked[ranked.length-1];
      var rankIcons=["🏆","🥈","🥉"];
      var getRankBg=function(i,len){if(i===0)return"linear-gradient(135deg,#fef3c7,#fde68a)";if(i===1)return"linear-gradient(135deg,#f1f5f9,#e2e8f0)";if(i===2)return"linear-gradient(135deg,#fed7aa,#fdba74)";if(i>=len-1&&len>2)return"linear-gradient(135deg,#fee2e2,#fecaca)";return"#fff";};

      return<div style={{marginBottom:16}}>
        {/* Podium Top 3 */}
        {ranked.length>=2&&<div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",justifyContent:"center"}}>
          {ranked.slice(0,Math.min(3,ranked.length)).map(function(p,i){
            var ringColor=i===0?"#f59e0b":i===1?"#94a3b8":"#f97316";
            return<div key={p.name} style={{flex:"1 1 200px",maxWidth:260,background:getRankBg(i,ranked.length),borderRadius:16,padding:20,textAlign:"center",border:"2px solid "+(i===0?"#fbbf24":i===1?"#d1d5db":"#fdba74"),boxShadow:i===0?"0 4px 20px rgba(251,191,36,.3)":"0 1px 4px rgba(0,0,0,.06)",position:"relative"}}>
              <div style={{fontSize:40,marginBottom:4}}>{rankIcons[i]}</div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:2}}>อันดับ {i+1}</div>
              <div style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:8}}>{p.name}</div>
              <div style={{display:"inline-block",padding:"6px 16px",borderRadius:20,background:p.rate>=70?"#d1fae5":p.rate>=40?"#fef3c7":"#fee2e2",marginBottom:8}}>
                <span style={{fontSize:22,fontWeight:800,color:p.rate>=70?"#059669":p.rate>=40?"#d97706":"#dc2626"}}>{p.rate}%</span>
                <span style={{fontSize:11,color:"#64748b",marginLeft:4}}>เซ็นรับ</span>
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:12,fontSize:11,color:"#475569"}}>
                <span>พัสดุ <b>{p.total}</b></span>
                <span style={{color:"#0d9488"}}>✅ {p.confirmed}</span>
                <span style={{color:"#dc2626"}}>❌ {p.returned}</span>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"#059669",marginTop:6}}>COD ฿{p.codOk.toLocaleString()}</div>
            </div>;
          })}
        </div>}

        {/* คนที่แย่ที่สุด — แสดงเมื่อมี ≥3 คนและคนสุดท้ายไม่ใช่คนแรก */}
        {ranked.length>=3&&worst.name!==best.name&&<div style={{background:"linear-gradient(135deg,#fef2f2,#fff1f2)",borderRadius:12,padding:16,marginBottom:16,border:"1px solid #fecaca",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{fontSize:32}}>⚠️</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:4}}>ต้องปรับปรุง — อันดับสุดท้าย</div>
            <div style={{fontSize:18,fontWeight:800,color:"#1e293b"}}>{worst.name}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>เซ็นรับ <b style={{color:"#dc2626"}}>{worst.rate}%</b> · พัสดุ {worst.total} · ส่งคืน {worst.returned} ({worst.failRate}%) · COD ฿{worst.codOk.toLocaleString()}</div>
          </div>
        </div>}

        {/* ตารางอันดับเต็ม */}
        <div style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🏅 อันดับผลงาน (เรียงจากดีสุด → แย่สุด)</div>
          <div style={{overflow:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:860}}>
              <thead><tr>
                <th style={{...thS,textAlign:"center",width:50}}>อันดับ</th>
                <th style={thS}>TeleSale</th>
                <th style={{...thS,textAlign:"center"}}>ทั้งหมด</th>
                <th style={{...thS,textAlign:"center",color:"#0d9488"}}>เซ็นรับ</th>
                <th style={{...thS,textAlign:"center",color:"#8b5cf6"}}>กำลังส่ง</th>
                <th style={{...thS,textAlign:"center",color:"#3b82f6"}}>ในระบบ</th>
                <th style={{...thS,textAlign:"center",color:"#f59e0b"}}>รอส่ง</th>
                <th style={{...thS,textAlign:"center",color:"#dc2626"}}>ส่งคืน</th>
                <th style={{...thS,textAlign:"center",width:120}}>% เซ็นรับ</th>
                <th style={{...thS,textAlign:"center",width:100}}>% ส่งคืน</th>
                <th style={{...thS,textAlign:"right"}}>COD เซ็นรับ</th>
              </tr></thead>
              <tbody>
                {ranked.map(function(p,i){
                  var isLast=i===ranked.length-1&&ranked.length>2;
                  var barColor=p.rate>=70?"#10b981":p.rate>=40?"#f59e0b":"#ef4444";
                  var failColor=p.failRate>=30?"#dc2626":p.failRate>=15?"#f59e0b":"#94a3b8";
                  var rowBg=i===0?"#fefce8":isLast?"#fef2f2":i%2===0?"#fff":"#f8fafc";
                  return<tr key={p.name} style={{background:rowBg}}>
                    <td style={{...tdS,textAlign:"center",fontSize:16}}>{rankIcons[i]||<span style={{fontSize:13,fontWeight:700,color:isLast?"#dc2626":"#64748b"}}>{i+1}</span>}</td>
                    <td style={{...tdS,fontWeight:700,fontSize:13,color:isLast?"#dc2626":"#1e293b"}}>{p.name} {isLast&&ranked.length>2?<span style={{fontSize:10,color:"#dc2626",fontWeight:600}}>⚠️</span>:""}</td>
                    <td style={{...tdS,textAlign:"center",fontWeight:700}}>{p.total}</td>
                    <td style={{...tdS,textAlign:"center",fontWeight:700,color:p.confirmed>0?"#0d9488":"#e2e8f0"}}>{p.confirmed||"-"}</td>
                    <td style={{...tdS,textAlign:"center",color:p.delivering>0?"#8b5cf6":"#e2e8f0"}}>{p.delivering||"-"}</td>
                    <td style={{...tdS,textAlign:"center",color:p.inTransit>0?"#3b82f6":"#e2e8f0"}}>{p.inTransit||"-"}</td>
                    <td style={{...tdS,textAlign:"center",color:p.pending>0?"#f59e0b":"#e2e8f0"}}>{p.pending||"-"}</td>
                    <td style={{...tdS,textAlign:"center",fontWeight:700,color:p.returned>0?"#dc2626":"#e2e8f0"}}>{p.returned||"-"}</td>
                    <td style={{...tdS,textAlign:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
                        <div style={{width:56,height:10,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:p.rate+"%",background:barColor,borderRadius:5}}/></div>
                        <span style={{fontSize:12,fontWeight:800,color:barColor,minWidth:32}}>{p.rate}%</span>
                      </div>
                    </td>
                    <td style={{...tdS,textAlign:"center"}}>
                      <span style={{fontSize:11,fontWeight:700,color:failColor}}>{p.failRate}%</span>
                    </td>
                    <td style={{...tdS,textAlign:"right",fontWeight:700,color:"#059669"}}>฿{p.codOk.toLocaleString()}</td>
                  </tr>;
                })}
                {/* แถวรวม */}
                <tr style={{background:"#fffbeb",fontWeight:800}}>
                  <td style={{...tdS,textAlign:"center"}}>📊</td>
                  <td style={{...tdS,fontSize:13}}>รวมทั้งหมด</td>
                  <td style={{...tdS,textAlign:"center",fontSize:14}}>{total}</td>
                  <td style={{...tdS,textAlign:"center",color:"#0d9488"}}>{byStatus["เซ็นรับแล้ว"]||0}</td>
                  <td style={{...tdS,textAlign:"center",color:"#8b5cf6"}}>{byStatus["กำลังจัดส่ง"]||0}</td>
                  <td style={{...tdS,textAlign:"center",color:"#3b82f6"}}>{(byStatus["อยู่ในระบบขนส่ง"]||0)+(byStatus["รับพัสดุแล้ว"]||0)}</td>
                  <td style={{...tdS,textAlign:"center",color:"#f59e0b"}}>{(byStatus["สร้างรายการ"]||0)+(byStatus[""]||0)}</td>
                  <td style={{...tdS,textAlign:"center",color:"#dc2626"}}>{(byStatus["ส่งคืน"]||0)+(byStatus["คืนสำเร็จ"]||0)}</td>
                  <td style={{...tdS,textAlign:"center"}}><span style={{fontSize:12,fontWeight:800,color:successRate>=50?"#10b981":"#f59e0b"}}>{successRate}%</span></td>
                  <td style={{...tdS,textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,color:total>0&&pct((byStatus["ส่งคืน"]||0)+(byStatus["คืนสำเร็จ"]||0),total)>=20?"#dc2626":"#94a3b8"}}>{pct((byStatus["ส่งคืน"]||0)+(byStatus["คืนสำเร็จ"]||0),total)}%</span></td>
                  <td style={{...tdS,textAlign:"right",fontSize:14,color:"#059669"}}>฿{codConfirmed.toLocaleString()}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>;
    })()}

    {/* กราฟแท่งรายวัน */}
    {dayList.length>1&&<div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📅 เช็คพัสดุรายวัน</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:180,padding:"0 4px"}}>
        {(function(){var maxT=Math.max.apply(null,dayList.map(function(d){return d.total;}))||1;return dayList.slice().sort(function(a,b){return a.date>b.date?1:-1;}).map(function(d){
          var h=Math.max(d.total/maxT*150,4);
          var hOk=d.total>0?Math.round(d.confirmed/d.total*h):0;
          return<div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:0}}>
            <span style={{fontSize:9,fontWeight:700,color:"#1e293b"}}>{d.total}</span>
            <div style={{width:"100%",maxWidth:36,borderRadius:"4px 4px 0 0",overflow:"hidden",height:h,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
              <div style={{height:hOk,background:"linear-gradient(180deg,#34d399,#10b981)"}}/>
              <div style={{height:h-hOk,background:"linear-gradient(180deg,#fde68a,#fbbf24)"}}/>
            </div>
            <span style={{fontSize:8,color:"#94a3b8",whiteSpace:"nowrap"}}>{d.date.substring(5)}</span>
          </div>;
        });})()}
      </div>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:8}}>
        <span style={{fontSize:10,color:"#10b981",fontWeight:600}}>🟩 ยืนยัน+ส่งแล้ว</span>
        <span style={{fontSize:10,color:"#fbbf24",fontWeight:600}}>🟨 อื่นๆ</span>
      </div>
    </div>}

/* ===== MAIN APP ===== */
function App(){var _s=useState;
  var[sbOk,setSbOk]=_s(sbReady);

  var[user,setUser]=_s(savedUser);var[accounts,setAccounts]=_s([]);var[allOrders,setAllOrders]=_s([]);var[upsellOrders,setUpsellOrders]=_s([]);var savedPage=localStorage.getItem("ps_page")||"orders";var[page,setPage0]=_s(savedPage);function setPage(p){setPage0(p);localStorage.setItem("ps_page",p);}var[showForm,setShowForm]=_s(false);var[notif,setNotif]=_s(null);var[viewOrder,setViewOrder]=_s(null);var[slipProgress,setSlipProgress]=_s(null);var[statusProgress,setStatusProgress]=_s(null);var[dateFrom,setDateFrom]=_s(todayStr());var[dateTo,setDateTo]=_s(todayStr());var[sidePhoneSearch,setSidePhoneSearch]=_s("");var userRef=useRef(savedUser);

  async function loadUpsellPrices(){try{var r=await sbFetch("app_settings?key=eq.upsell_prices&select=value");if(r&&r.length>0&&r[0].value){setUpsellPrices(r[0].value.split(",").map(Number).filter(function(n){return n>0;}));}else{setUpsellPrices([399,599,799,999,1290]);}}catch(e){setUpsellPrices([399,599,799,999,1290]);}}
  async function saveUpsellPrices(prices){try{var val=prices.join(",");await sbFetch("app_settings?key=eq.upsell_prices",{method:"PATCH",body:{value:val,updated_at:new Date().toISOString()}});setUpsellPrices(prices);notify("✅ บันทึกราคา Upsell แล้ว");}catch(e){notify("❌ บันทึกไม่สำเร็จ","warning");}}
  async function loadParcels(){try{var d=await dbGetParcels();setParcels(d||[]);}catch(e){console.error("loadParcels:",e);setParcels([]);}}
  function notify(msg,type){setNotif({msg:msg,type:type||"success"});setTimeout(function(){setNotif(null);},3500);}
  async function loadAccounts(){try{var d=await dbGetAccounts();setAccounts(d);var cur=userRef.current;if(cur){var match=d.find(function(a){return a.username===cur.username;});if(match&&(cur.nickname!==match.nickname||cur.displayName!==match.displayName)){var u2={...cur,nickname:match.nickname,displayName:match.displayName};userRef.current=u2;setUser(u2);localStorage.setItem("ps_user",JSON.stringify(u2));}}}catch(e){console.error(e);}}
  async function loadOrders(){var u=userRef.current;if(!u)return;try{var d=await dbGetOrders(u.role==="admin"||u.role==="shipping"||u.role==="accounting"?"ALL":u.username);var accs=(accounts&&accounts.length>0)?accounts:await dbGetAccounts();var em={};accs.forEach(function(a){em[a.username]=extractRealName(a.displayName);});setAllOrders(d.map(function(o){return{...o,StaffName:em[o.AccountEmail]||""};}));}catch(e){notify("โหลดผิดพลาด","warning");}}
  async function loadUpsell(){var u=userRef.current;if(!u)return;try{var d=await dbGetUpsell(u.role==="admin"||u.role==="shipping"||u.role==="accounting"?"ALL":u.username);var accs=(accounts&&accounts.length>0)?accounts:await dbGetAccounts();var em={};accs.forEach(function(a){em[a.username]=extractRealName(a.displayName);});setUpsellOrders(d.map(function(o){return{...o,StaffName:em[o.AccountEmail]||""};}));}catch(e){}}
  useEffect(function(){if(sbOk){loadAccounts();loadUpsellPrices();loadParcels();}},[sbOk]);
  useEffect(function(){if(accounts.length>0&&(allOrders.length>0||upsellOrders.length>0)){var em={};accounts.forEach(function(a){em[a.username]=a.displayName;});if(allOrders.length>0&&!allOrders[0].StaffName){setAllOrders(function(p){return p.map(function(o){return{...o,StaffName:em[o.AccountEmail]||""};});});}if(upsellOrders.length>0&&!upsellOrders[0].StaffName){setUpsellOrders(function(p){return p.map(function(o){return{...o,StaffName:em[o.AccountEmail]||""};});});}}},[accounts]);
  useEffect(function(){if(userRef.current&&sbOk){loadOrders();loadUpsell();
    // Auto-refresh ทุก 15 วินาที
    var interval=setInterval(function(){loadOrders();loadUpsell();},60000);
    var parcelInterval=setInterval(function(){loadParcels();},30000);

    // Flash auto-sync — ทำงานเบื้องหลังตลอด ไม่ต้องเปิดหน้าเช็คพัสดุ
    var flashSyncRunning=false;
    async function runFlashAutoSync(){
      if(flashSyncRunning)return;
      flashSyncRunning=true;
      try{
        var pending=await sbFetch("parcel_checks?select=id,tracking_no,flash_status&flash_status=not.in.(เซ็นรับแล้ว,คืนสำเร็จ,ไม่พบข้อมูล)&tracking_no=like.TH*&order=id.desc",{range:"0-49"});
        if(!pending||pending.length===0){flashSyncRunning=false;return;}
        var updates={};
        for(var i=0;i<pending.length;i++){
          var newSt=null;
          try{
            var res=await flashGetTracking(pending[i].tracking_no);
            if(res&&res.code===1&&res.data){var nf=flashStateText(res.data.state);if(nf)newSt=nf;}
            else if(res)newSt="ไม่พบข้อมูล";
          }catch(e){}
          if(newSt&&newSt!==pending[i].flash_status){
            if(!updates[newSt])updates[newSt]=[];
            updates[newSt].push(pending[i].id);
          }
          await new Promise(function(r){setTimeout(r,1000);});
        }
        var totalOk=0;
        for(var st in updates){
          var ids=updates[st];
          for(var j=0;j<ids.length;j+=50){
            var chunk=ids.slice(j,j+50);
            try{await sbFetch("parcel_checks?id=in.("+chunk.join(",")+")",{method:"PATCH",body:{flash_status:st}});totalOk+=chunk.length;}catch(e){}
          }
        }
        if(totalOk>0)loadParcels();
      }catch(e){}
      flashSyncRunning=false;
    }
    var flashFirst=setTimeout(runFlashAutoSync,3000);
    var flashInterval=setInterval(runFlashAutoSync,60000);
    // Sync Flash status หลังโหลดข้อมูลครั้งแรก
    // Flash sync ถูกปิด
    // Flash sync ถูกปิด — ไม่ซิงค์สถานะ Flash อัตโนมัติ
    return function(){clearInterval(interval);clearInterval(parcelInterval);clearTimeout(flashFirst);clearInterval(flashInterval);};
  }},[sbOk]);

function ProductRank({orders,title}){
  if(!orders||orders.length===0)return null;
  // แยกสินค้าจาก Remark
  var prodMap={};
  orders.forEach(function(o){
    var rm=String(o.Remark||"").trim();if(!rm)return;
    // ลบ [PREV:xxx] และราคา/ปลายทาง/โอนเงิน ออก
    var clean=rm.replace(/\[PREV:\d+\]\s*/g,"").replace(/ปลายทาง\s*\d+/gi,"").replace(/โอนเงิน\s*\d*/gi,"").replace(/\d+\s*บาท/gi,"").replace(/\s+/g," ").trim();
    if(!clean)clean=rm;
    var key=clean.toLowerCase();
    if(!prodMap[key])prodMap[key]={name:clean,count:0,sales:0};
    prodMap[key].count++;
    prodMap[key].sales+=Number(o.SalePrice)||0;
  });
  var prods=Object.values(prodMap).sort(function(a,b){return b.sales-a.sales;});
  if(prods.length===0)return null;
  var maxS=prods[0].sales||1;
  return<div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
    <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{title||"📦 โปรขายดี"}</div>
    <div style={{maxHeight:300,overflowY:"auto"}}>
    {prods.slice(0,20).map(function(p,i){
      var barW=Math.max(p.sales/maxS*100,5);
      return<div key={p.name+i} style={{marginBottom:6,padding:"8px 12px",borderRadius:8,background:i===0?"#fef3c7":i<3?"#fffbeb":"#f8fafc",border:i===0?"2px solid #fbbf24":"1px solid #e2e8f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14,width:24,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)}</span>
            <span style={{fontWeight:600,fontSize:12}}>{p.name}</span>
          </div>
          <span style={{fontWeight:800,fontSize:14,color:"#d97706"}}>฿{p.sales.toLocaleString()}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,height:5,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:barW+"%",background:i===0?"linear-gradient(90deg,#f59e0b,#d97706)":i<3?"#fbbf24":"#94a3b8",borderRadius:3}}/>
          </div>
          <span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{p.count} ออเดอร์</span>
        </div>
      </div>;
    })}
    </div>
  </div>;
}

function CustomerSearchPage({allOrders,upsellOrders,user,isAdmin,onEdit,onRefresh}){

  var results=q.length>=2?myAll.filter(function(o){var ql=q.toLowerCase();return phoneMatch(o.MobileNo,q)||String(o.Name||"").toLowerCase().indexOf(ql)>=0;}):[]; 
  // Group by phone
  var grouped={};
  results.forEach(function(o){
    var phone=String(o.MobileNo||"").replace(/\D/g,"");
    if(!phone)return;
    if(!grouped[phone])grouped[phone]={name:o.Name||"",phone:phone,orders:[],totalCOD:0,totalTransfer:0,count:0};
    grouped[phone].orders.push(o);
    grouped[phone].count++;
    if(Number(o.COD)>0)grouped[phone].totalCOD+=Number(o.COD);
    else grouped[phone].totalTransfer+=Number(o.SalePrice||0);
    if(!grouped[phone].name&&o.Name)grouped[phone].name=o.Name;
  });
  var customers=Object.values(grouped).sort(function(a,b){return b.count-a.count;});

        {q&&<button onClick={function(){setQ("");setExpandId(null);}} style={{padding:"10px 16px",borderRadius:10,border:"none",background:"#f1f5f9",color:"#94a3b8",fontSize:13,fontWeight:700,cursor:"pointer"}}>✕ ล้าง</button>}
      </div>
      {!q&&<div style={{fontSize:12,color:"#94a3b8",marginTop:8}}>💡 พิมพ์อย่างน้อย 2 ตัวอักษร — ค้นจาก Order + Upsell{!isAdmin?" (เฉพาะลูกค้าของคุณ)":""}</div>}
    </div>
    {q.length>=2&&<div>
      <div style={{fontSize:13,color:"#64748b",marginBottom:10}}>พบ <b style={{color:"#1e293b"}}>{customers.length}</b> ลูกค้า · <b>{results.length}</b> ออเดอร์</div>
      {customers.length===0&&<div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#94a3b8"}}>
        <div style={{fontSize:40,marginBottom:8}}>📭</div>
        <div style={{fontSize:14,fontWeight:600}}>ไม่พบลูกค้าที่ค้นหา</div>
      </div>}
      {customers.map(function(c){
        var isOpen=expandId===c.phone;
        var total=c.totalCOD+c.totalTransfer;
        return<div key={c.phone} style={{background:"#fff",borderRadius:12,marginBottom:8,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <div onClick={function(){setExpandId(isOpen?null:c.phone);}} style={{padding:14,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{c.name} <span style={{color:"#94a3b8",fontWeight:400,fontSize:12}}>{c.phone}</span></div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>สั่ง <b style={{color:"#d97706"}}>{c.count}</b> ครั้ง · ยอดรวม <b style={{color:"#059669"}}>฿{total.toLocaleString()}</b>{c.totalCOD>0?" · COD ฿"+c.totalCOD.toLocaleString():""}</div>
            </div>
            <span style={{fontSize:18,color:"#94a3b8"}}>{isOpen?"▲":"▼"}</span>
          </div>
          {isOpen&&<div style={{borderTop:"1px solid #f1f5f9",padding:"0 14px 14px"}}>
            {c.orders.sort(function(a,b){return(b.Timestamp||"").localeCompare(a.Timestamp||"");}).map(function(o,i){
              var src=o._table==="upsell"?"🔥 Upsell":"📋 Order";
              var canEdit=isAdmin&&!o.TrackingNo&&onEdit;
              var isEditing=editingOid===o.OrderID;
              return<div key={o.OrderID+"-"+i} style={{padding:"10px 0",borderBottom:i<c.orders.length-1?"1px solid #f8fafc":"none",fontSize:12}}>
                {isEditing?<div style={{background:"#eff6ff",borderRadius:8,padding:10,border:"1px solid #bfdbfe"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#2563eb",marginBottom:8}}>✏️ แก้ไขออเดอร์</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    <div><div style={{fontSize:10,color:"#64748b"}}>ชื่อ</div><input value={ef.Name} onChange={function(e){setEf(function(p){return{...p,Name:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>เบอร์โทร</div><input value={ef.MobileNo} onChange={function(e){setEf(function(p){return{...p,MobileNo:e.target.value};});}} style={iS}/></div>
                    <div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:"#64748b"}}>ที่อยู่</div><input value={ef.Address} onChange={function(e){setEf(function(p){return{...p,Address:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>ตำบล</div><input value={ef.SubDistrict} onChange={function(e){setEf(function(p){return{...p,SubDistrict:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>อำเภอ</div><input value={ef.District} onChange={function(e){setEf(function(p){return{...p,District:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>จังหวัด</div><input value={ef.Province} onChange={function(e){setEf(function(p){return{...p,Province:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>รหัส ปณ.</div><input value={ef.ZIP} onChange={function(e){setEf(function(p){return{...p,ZIP:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>ราคาขาย</div><input value={ef.SalePrice} onChange={function(e){setEf(function(p){return{...p,SalePrice:e.target.value};});}} style={iS}/></div>
                    <div><div style={{fontSize:10,color:"#64748b"}}>COD</div><input value={ef.COD} onChange={function(e){setEf(function(p){return{...p,COD:e.target.value};});}} style={iS}/></div>
                    <div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:"#64748b"}}>หมายเหตุ</div><input value={ef.Remark} onChange={function(e){setEf(function(p){return{...p,Remark:e.target.value};});}} style={iS}/></div>
                  </div>
                  <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:8}}>
                    <button onClick={function(){setEditingOid(null);}} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:11,cursor:"pointer"}}>ยกเลิก</button>
                    <button disabled={saving} onClick={function(){saveEdit(o);}} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"#2563eb",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>{saving?"⏳":"✅ บันทึก"}</button>
                  </div>

                      <div style={{fontWeight:600,marginTop:2,color:Number(o.COD)>0?"#ef4444":"#10b981"}}>{Number(o.COD)>0?"COD ฿"+Number(o.COD).toLocaleString():"โอน ฿"+Number(o.SalePrice||0).toLocaleString()}</div>
                    </div>
                    <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:6}}>
                      {canEdit&&<button onClick={function(ev){ev.stopPropagation();startEdit(o);}} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #bfdbfe",background:"#eff6ff",color:"#2563eb",fontSize:10,fontWeight:600,cursor:"pointer"}}>✏️ แก้ไข</button>}
                      <div>
                        {o.TrackingNo?<span onClick={function(){copyTrack(o.TrackingNo);}} style={{color:"#2563eb",fontWeight:700,cursor:"pointer",fontSize:11}}>{o.TrackingNo} 📋</span>:<span style={{color:"#d97706",fontSize:10}}>ยังไม่มีเลขพัสดุ</span>}
                        {o.FlashStatus&&<div style={{fontSize:10,color:"#64748b",marginTop:2}}>{o.FlashStatus}</div>}
                      </div>
                    </div>
                  </div>
                  {o.Remark&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>📝 {String(o.Remark).replace(/\[PREV:\d+\]\s*/g,"")}</div>}
                </div>}
              </div>;
            })}
          </div>}
        </div>;
      })}
    </div>}
  </div>;
}

function TeamPage({accounts,onAdd,onToggle,onSaveUpsellBatch,onDel,onResetPw,onEditAcc}){var[show,setShow]=useState(false);var[nf,setNf]=useState({username:"",displayName:"",nickname:"",password:"",role:"user"});var[resetId,setResetId]=useState(null);var[newPw,setNewPw]=useState("");var[editAcc,setEditAcc]=useState(null);var[editSaving,setEditSaving]=useState(false);var[upsellEdit,setUpsellEdit]=useState(null);var[saving,setSaving]=useState(false);var[showPw,setShowPw]=useState(false);var[bulkMode,setBulkMode]=useState(false);var[bulkRows,setBulkRows]=useState([{username:"",displayName:"",password:"",role:"user"}]);var[bulkAdding,setBulkAdding]=useState(false);
  function handleAdd(){if(!nf.username||!nf.displayName||!nf.password){alert("กรอกให้ครบ");return;}onAdd({...nf,active:true}).then(function(ok){if(ok){setNf({username:"",displayName:"",nickname:"",password:"",role:"user"});setShow(false);}});}
  function updateBulkRow(idx,field,val){setBulkRows(function(prev){var n=[...prev];n[idx]={...n[idx]};n[idx][field]=val;return n;});}
  function addBulkRow(){if(bulkRows.length>=50){alert("สูงสุด 50 คน");return;}setBulkRows(function(p){return p.concat([{username:"",displayName:"",password:"",role:"user"}]);});}
  function removeBulkRow(idx){setBulkRows(function(p){if(p.length<=1)return p;return p.filter(function(_,i){return i!==idx;});});}
  async function handleBulkAdd(){
    var valid=bulkRows.filter(function(r){return r.username&&r.displayName&&r.password;});
    var invalid=bulkRows.length-valid.length;
    if(valid.length===0){alert("กรุณากรอกข้อมูลอย่างน้อย 1 คน\n(ต้องมี Email, ชื่อ, Password)");return;}
    if(invalid>0&&!confirm("มี "+invalid+" แถวที่กรอกไม่ครบ จะข้ามไป\n\nเพิ่ม "+valid.length+" คน?"))return;
    if(invalid===0&&!confirm("เพิ่ม "+valid.length+" คน?"))return;
    setBulkAdding(true);
    var ok=0,fail=0,failNames=[];
    for(var j=0;j<valid.length;j++){
      try{var res=await onAdd({...valid[j],active:true});if(res)ok++;else{fail++;failNames.push(valid[j].displayName);}}catch(e){fail++;failNames.push(valid[j].displayName);}
    }
    setBulkAdding(false);
    var msg="✅ เพิ่มสำเร็จ "+ok+" คน";if(fail>0)msg+="\n❌ ผิดพลาด "+fail+" คน: "+failNames.join(", ");
    alert(msg);if(ok>0){setBulkRows([{username:"",displayName:"",password:"",role:"user"}]);setBulkMode(false);}
  }
  function startUE(){var c=[];accounts.forEach(function(a){if(a.canUpsell)c.push(a.username);});setUpsellEdit(c);}
  function toggleUE(u){setUpsellEdit(function(p){return p.indexOf(u)>=0?p.filter(function(x){return x!==u;}):p.concat([u]);});}
  function saveUE(){setSaving(true);onSaveUpsellBatch(upsellEdit).then(function(){setSaving(false);setUpsellEdit(null);});}
  return<div><div style={S.pageHeader}><h1 style={S.pageTitle}>👥 พนักงาน</h1></div>
    {resetId&&<div style={S.modalOverlay} onClick={function(){setResetId(null);}}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:380}} onClick={function(e){e.stopPropagation();}}><h3 style={{margin:"0 0 14px",fontWeight:700,fontSize:15}}>🔑 รีเซ็ต Password</h3><div style={{position:"relative",marginBottom:14}}><input type={showPw?"text":"password"} value={newPw} onChange={function(e){setNewPw(e.target.value);}} placeholder="Password ใหม่" style={{...S.pInput,paddingRight:40}}/><button onClick={function(){setShowPw(!showPw);}} type="button" style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#94a3b8",padding:4}}>{showPw?"🙈":"👁"}</button></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={function(){setResetId(null);}}>ยกเลิก</button><button style={S.submitBtn} onClick={function(){if(newPw.length<4){alert("4+ ตัว");return;}onResetPw(resetId,newPw);setResetId(null);setNewPw("");}}>บันทึก</button></div></div></div>}
    {editAcc&&<div style={S.modalOverlay} onClick={function(){setEditAcc(null);}}><div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:400}} onClick={function(e){e.stopPropagation();}}><h3 style={{margin:"0 0 16px",fontWeight:700,fontSize:15}}>✏️ แก้ไขบัญชี</h3><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}><div><label style={S.fLabel}>Email</label><input value={editAcc.username} onChange={function(e){setEditAcc({...editAcc,username:e.target.value});}} style={S.pInput}/></div><div><label style={S.fLabel}>ชื่อ</label><input value={editAcc.displayName} onChange={function(e){setEditAcc({...editAcc,displayName:e.target.value});}} style={S.pInput}/></div><div><label style={{...S.fLabel,color:"#d97706"}}>ชื่อเล่น (ใช้ในออเดอร์)</label><input value={editAcc.nickname||""} onChange={function(e){setEditAcc({...editAcc,nickname:e.target.value});}} placeholder="เช่น ปอนด์, ออย(ช)" style={{...S.pInput,borderColor:"#fbbf24"}}/></div><div><label style={S.fLabel}>บทบาท</label><select value={editAcc.role} onChange={function(e){setEditAcc({...editAcc,role:e.target.value});}} style={S.pInput}><option value="user">พนักงาน</option><option value="shipping">จัดส่ง</option><option value="accounting">บัญชี</option><option value="admin">แอดมิน</option></select></div></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={function(){setEditAcc(null);}}>ยกเลิก</button><button style={S.submitBtn} disabled={editSaving} onClick={async function(){if(!editAcc.username||!editAcc.displayName){alert("กรอก Email และชื่อ");return;}setEditSaving(true);try{var ok=await onEditAcc(editAcc.oldUsername,editAcc);if(ok){setEditAcc(null);}else{alert("บันทึกไม่สำเร็จ");}}catch(e){alert("เกิดข้อผิดพลาด:\n"+String(e.message||e).substring(0,200));}setEditSaving(false);}}>{editSaving?"⏳ กำลังบันทึก...":"บันทึก"}</button></div></div></div>}
    <div style={{background:"#fff",borderRadius:10,padding:20,marginBottom:16,border:"1px solid #e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{margin:0,fontSize:14,fontWeight:700}}>บัญชี {accounts.length} คน</h3><div style={{display:"flex",gap:6}}><button onClick={function(){setBulkMode(!bulkMode);setShow(false);}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:bulkMode?"#fef3c7":"#f8fafc",color:bulkMode?"#92400e":"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}>{bulkMode?"✕":"📋 เพิ่มหลายคน"}</button><button onClick={function(){setShow(!show);setBulkMode(false);}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:show?"#fef2f2":"#f8fafc",color:show?"#ef4444":"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}>{show?"✕":"＋ เพิ่ม"}</button></div></div>

<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

/* ===== API ===== */
var DEFAULT_API = "https://script.google.com/macros/s/AKfycbxxXhfjp9P5c1CCl0OSu3PeSEatsdU_fT2mD3lhzQPQ7741oORrM8hPbgLjZwzYkwcTeQ/exec";
// ล้าง URL เก่าที่ cache ไว้ ให้ใช้ DEFAULT_API เสมอ
try { var _old = localStorage.getItem("ps_api"); if(_old && _old !== DEFAULT_API) localStorage.removeItem("ps_api"); } catch(e){}
function getApiUrl(){ return localStorage.getItem("ps_api") || DEFAULT_API; }
function setApiUrl(u){ localStorage.setItem("ps_api", u); }

async function api(action, params, body) {
  var base = getApiUrl();
  if (!base) throw new Error("NO_API");
  var url = new URL(base);
  url.searchParams.set("action", action);
  if (params) { for (var k in params) url.searchParams.set(k, params[k]); }
  var opts = { redirect: "follow" };
  if (body) { opts.method = "POST"; opts.body = JSON.stringify(body); }
  var res = await fetch(url.toString(), opts);
  var text = await res.text();
  var data = JSON.parse(text);
  if (data && !data.success && data.error) throw new Error(data.error);
  return data;
}

/* ===== SMART PARSE ===== */
// ค้นหารหัสไปรษณีย์จาก ตำบล+อำเภอ อัตโนมัติ
function lookupZIP(sub, dist) {
  if (!sub || typeof TH === "undefined") return "";
  // ค้นหาแบบตรง ตำบล+อำเภอ
  for (var i = 0; i < TH.length; i++) {
    if (TH[i][0] === sub && dist && TH[i][1] === dist) return String(TH[i][3]);
  }
  // ค้นแบบ contains
  for (var i = 0; i < TH.length; i++) {
    if (TH[i][0] === sub && (!dist || TH[i][1].indexOf(dist) >= 0 || dist.indexOf(TH[i][1]) >= 0)) return String(TH[i][3]);
  }
  // ค้นแค่ตำบล
  for (var i = 0; i < TH.length; i++) {
    if (TH[i][0] === sub) return String(TH[i][3]);
  }
  // ค้นจากอำเภอ
  if (dist) {
    for (var i = 0; i < TH.length; i++) {
      if (TH[i][1] === dist) return String(TH[i][3]);
    }
  }
  return "";
}

function smartParse(t) {
  t = t.trim(); if (!t) return null;
  var r = {MobileNo:"",Name:"",Address:"",SubDistrict:"",District:"",ZIP:"",CustomerFBLine:"",SalePrice:"",COD:"",Remark:""};
  var pm = t.match(/\b(0[689]\d[\s-]?\d{3,4}[\s-]?\d{4})\b/);
  if (pm) { var ph=pm[1].replace(/[\s-]/g,""); r.MobileNo = ph.substring(0,10); }
  var zm = t.match(/\b(\d{5})\b/);
  if (zm) r.ZIP = zm[1].substring(0,5);
  var pp = [/ปลายทาง\s*(\d[\d,]*)\s*(?:บาท)?/i,/(?:COD|cod)\s*[:=]?\s*(\d[\d,]*)/i,/(\d[\d,]*)\s*บาท/];
  for (var i=0;i<pp.length;i++){var m=t.match(pp[i]);if(m){r.COD=r.SalePrice=m[1].replace(/,/g,"");break;}}
  var prp = [/(Kiso\S*(?:\s*\([^)]*\))?)/i,/สินค้า\s*[:：]?\s*([^\n]+)/];
  for (var i=0;i<prp.length;i++){var m=t.match(prp[i]);if(m){r.Remark=m[1].trim()+(t.indexOf("ปลายทาง")>=0?" ปลายทาง":"");break;}}
  var lines = t.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
  var nl = lines.find(function(l){return /^(คุณ|นาย|นาง|น\.?ส\.?|นางสาว|mr\.?|mrs\.?|ms\.?)/i.test(l);});
  if (!nl) {
    nl = lines.find(function(l){
      if (/^0[689]\d/.test(l)) return false;
      if (/^\d+[\s/]|ถนน|ซอย|หมู่|ม\./.test(l)) return false;
      if (/\d{5}/.test(l) && !/\S+\s+\S+/.test(l.replace(/\d{5}/,""))) return false;
      if (/บาท|ปลายทาง|COD|cod|ราคา/i.test(l)) return false;
      if (/^[Pp]\s*[:：]/i.test(l)) return false;
      if (/Kiso|สินค้า|product/i.test(l)) return false;
      if (l.length < 2) return false;
      return true;
    });
  }
  if (nl) { var n=nl; if(r.MobileNo) n=n.replace(r.MobileNo,""); r.Name=n.replace(/\d{5}/,"").trim(); }
  var al = lines.find(function(l){return /\d+[\s/]|ถนน|ซอย|หมู่/.test(l) && l!==r.Name;});
  if (al) {
    var rem=al; if(r.ZIP)rem=rem.replace(r.ZIP,"");
    ["กทม","กรุงเทพมหานคร","กรุงเทพ"].forEach(function(p){rem=rem.replace(p,"");});
    rem=rem.trim();
    var sdm=t.match(/(?:ต\.|ตำบล|แขวง)\s*(\S+)/), dm=t.match(/(?:อ\.|อำเภอ|เขต)\s*(\S+)/);
    if(sdm) r.SubDistrict=sdm[1]; if(dm) r.District=dm[1];
    if(!r.SubDistrict||!r.District){var pts=rem.split(/\s+/).filter(function(p){return p.length>0;});if(pts.length>=3){var ae=0;for(var i=0;i<pts.length;i++){if(/\d|ถนน|ซอย|หมู่/.test(pts[i]))ae=i+1;}var af=pts.slice(ae);if(!r.SubDistrict&&af.length>=1)r.SubDistrict=af[0];if(!r.District&&af.length>=2)r.District=af[1];r.Address=pts.slice(0,ae).join(" ");}else r.Address=rem;}
    else{var a=rem;if(r.SubDistrict)a=a.replace(r.SubDistrict,"");if(r.District)a=a.replace(r.District,"");r.Address=a.replace(/(?:ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต)\s*/g,"").trim();}
  }
  // ถ้าจับ ตำบล/อำเภอ ได้ แต่ไม่มี ZIP → ค้นหาอัตโนมัติ
  if (!r.ZIP && (r.SubDistrict || r.District)) {
    var autoZip = lookupZIP(r.SubDistrict, r.District);
    if (autoZip) r.ZIP = autoZip;
  }
  return r;
}

/* ===== MAIN APP ===== */
function App() {
  var _s = useState; // shorthand
  var [apiOk, setApiOk] = _s(!!getApiUrl());
  // === Session: เก็บ Login ไว้ใน localStorage ===
  var savedUser = null;
  try { var raw = localStorage.getItem("ps_user"); if(raw) savedUser = JSON.parse(raw); } catch(e){}

  var [user, setUser] = _s(savedUser);
  var [accounts, setAccounts] = _s([]);
  var [orders, setOrders] = _s([]);
  var [page, setPage] = _s("orders");
  var [showForm, setShowForm] = _s(false);
  var [search, setSearch] = _s("");
  var [reportType, setReportType] = _s("daily");
  var [notif, setNotif] = _s(null);
  var [viewOrder, setViewOrder] = _s(null);
  var [loading, setLoading] = _s(false);
  var userRef = useRef(savedUser);
  var [products, setProducts] = _s([]);
  var [slipProgress, setSlipProgress] = _s(null); // null=ไม่อัพโหลด, 0-100=กำลังอัพ

  function notify(msg, type) { setNotif({msg:msg,type:type||"success"}); setTimeout(function(){setNotif(null);},3500); }

  async function loadAccounts() {
    try { var d = await api("getAccounts"); setAccounts(d.accounts||[]); } catch(e) { if(String(e)==="Error: NO_API") setApiOk(false); }
  }
  async function loadOrders() {
    var u = userRef.current; if(!u) return;
    try { var d = await api("getOrders",{userId:u.role==="admin"?"ALL":u.displayName}); setOrders(d.orders||[]); } catch(e) { console.error(e); notify("โหลดออเดอร์ผิดพลาด","warning"); }
  }
  async function loadProducts() {
    try { var d = await api("getProducts"); setProducts((d.products||[]).filter(function(p){return p.active;})); } catch(e) { console.error(e); }
  }

  useEffect(function(){ if(apiOk){ loadAccounts(); loadProducts(); } },[apiOk]);

  // Auto-load orders if already logged in (refresh)
  useEffect(function(){ if(userRef.current) loadOrders(); },[]);

  function doLogin(acc) { userRef.current=acc; setUser(acc); localStorage.setItem("ps_user",JSON.stringify(acc)); loadOrders(); }
  function doLogout() { userRef.current=null; setUser(null); setOrders([]); localStorage.removeItem("ps_user"); }

  if (!apiOk) return <SetupScreen onSave={function(u){setApiUrl(u);setApiOk(true);}}/>;
  if (!user) return <LoginScreen accounts={accounts} onLogin={doLogin} onReload={loadAccounts} onSetup={function(){setApiOk(false);}}/>;

  var isAdmin = user.role === "admin";
  var filtered = orders;
  if (search) {
    var sl = search.toLowerCase();
    filtered = orders.filter(function(o){
      return (o.Name||"").toLowerCase().indexOf(sl)>=0 || String(o.MobileNo||"").indexOf(sl)>=0 || (o.OrderID||"").toLowerCase().indexOf(sl)>=0 || (o.SalesPerson||"").toLowerCase().indexOf(sl)>=0 || (o.Remark||"").toLowerCase().indexOf(sl)>=0;
    });
  }
  var totalS=0,totalC=0,totalNonCod=0; orders.forEach(function(o){var sp=Number(o.SalePrice)||0;var cod=Number(o.COD)||0;totalS+=sp;totalC+=cod;if(cod===0)totalNonCod+=sp;});
  var stats = {total:orders.length, totalSales:totalS, totalCOD:totalC, totalNonCOD:totalNonCod};

  async function addOrder(data) {
    // ไม่ปิดฟอร์มทันที → ให้ overlay "กำลังบันทึก" แสดงก่อน
    var slipData = data.slipData || "";
    var payload = {SalesPerson:user.displayName, SalesChannel:"CRM",
      MobileNo:data.MobileNo, Name:data.Name, Address:data.Address, SubDistrict:data.SubDistrict,
      District:data.District, ZIP:data.ZIP, CustomerFBLine:data.CustomerFBLine||"",
      SalePrice:data.SalePrice, COD:data.COD, Remark:data.Remark,
      upsell: data.upsell ? true : false};
    try {
      var res = await api("addOrder",null,payload);
      var orderId = res.orderId;
      // ปิดฟอร์มหลัง API ตอบ
      setShowForm(false);
      notify("✅ " + orderId + (data.upsell ? " → 🔥 Upsell" : " → Orders"));
      if (!data.upsell) {
        var now = new Date();
        var ts = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0");
        setOrders(function(prev){return [{OrderID:orderId,Timestamp:ts,MobileNo:data.MobileNo,Name:data.Name,Address:data.Address,SubDistrict:data.SubDistrict,District:data.District,ZIP:data.ZIP,CustomerFBLine:data.CustomerFBLine||"",SalesChannel:"CRM",SalesPerson:user.displayName,SalePrice:data.SalePrice,COD:data.COD,Remark:data.Remark,SlipURL:""}].concat(prev);});
      }
      if (slipData) { uploadSlip(orderId, slipData); }
      else { loadOrders(); }
    } catch(e) { setShowForm(false); notify(e.message,"warning"); }
  }
  async function delOrder(oid) {
    setViewOrder(null);
    setOrders(function(prev){return prev.filter(function(o){return o.OrderID!==oid;});});
    try { await api("deleteOrder",{orderId:oid,role:user.role}); notify("ลบสำเร็จ"); loadOrders(); } catch(e) { notify("ลบผิดพลาด","warning"); loadOrders(); }
  }
  async function uploadSlip(orderId, base64) {
    try {
      setSlipProgress(0);
      // จำลองความคืบหน้า (เพราะ fetch ไม่มี upload progress)
      var prog = 0;
      var timer = setInterval(function(){
        prog += Math.random() * 15 + 5;
        if (prog > 90) prog = 90;
        setSlipProgress(Math.round(prog));
      }, 300);

      var r = await api("uploadSlip",null,{orderId:orderId,base64:base64});
      clearInterval(timer);

      if(r.success){
        setSlipProgress(100);
        notify("✅ อัพโหลดสลิปเสร็จสิ้น!");
        setOrders(function(prev){return prev.map(function(o){return o.OrderID===orderId?{...o,SlipURL:r.slipUrl}:o;});});
        setViewOrder(function(prev){return prev&&prev.OrderID===orderId?{...prev,SlipURL:r.slipUrl}:prev;});
        // แสดง 100% สักครู่แล้วซ่อน
        setTimeout(function(){ setSlipProgress(null); }, 2000);
        loadOrders();
        return r.slipUrl;
      } else {
        setSlipProgress(null);
        notify(r.error||"ผิดพลาด","warning");
        return null;
      }
    } catch(e) {
      setSlipProgress(null);
      notify("อัพโหลดสลิปผิดพลาด","warning");
      return null;
    }
  }
  async function addAcc(acc) {
    try { var r=await api("addAccount",null,acc); if(r.success){notify("เพิ่ม "+acc.displayName+" สำเร็จ!");await loadAccounts();return true;}else{notify(r.error||"ผิดพลาด","warning");return false;} } catch(e){notify(e.message,"warning");return false;}
  }
  async function toggleAcc(u){try{await api("toggleAccount",{username:u});await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}}
  async function toggleUpsell(u){try{await api("toggleUpsell",{username:u});await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}}
  async function saveUpsellBatch(usernames){
    try{await api("setUpsellBatch",null,{usernames:usernames});notify("บันทึกสิทธิ์ Upsell สำเร็จ (" + usernames.length + " คน)");await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}
  }
  async function delAcc(u){try{await api("deleteAccount",{username:u});notify("ลบแล้ว","warning");await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}}
  async function resetPw(u,pw){try{await api("resetPassword",null,{username:u,password:pw});notify("รีเซ็ตรหัสผ่านแล้ว");await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}}
  async function editAcc(oldUsername,data){try{var r=await api("editAccount",null,{oldUsername:oldUsername,username:data.username,displayName:data.displayName,role:data.role});if(r.success){notify("แก้ไขบัญชีสำเร็จ");await loadAccounts();
    // ถ้าแก้บัญชีตัวเอง → อัพเดท session ทันที
    var cur=userRef.current;
    if(cur&&cur.username===oldUsername){
      var updated={...cur,username:data.username||cur.username,displayName:data.displayName||cur.displayName,role:data.role||cur.role};
      userRef.current=updated;setUser(updated);localStorage.setItem("ps_user",JSON.stringify(updated));
    }
    return true;}else{notify(r.error||"ผิดพลาด","warning");return false;}}catch(e){notify(e.message,"warning");return false;}}
  async function addProduct(d){try{var r=await api("addProduct",null,d);if(r.success){notify("เพิ่มสินค้า "+d.name);await loadProducts();return true;}else{notify(r.error||"ผิดพลาด","warning");return false;}}catch(e){notify(e.message,"warning");return false;}}
  async function delProduct(name){try{await api("deleteProduct",{name:name});notify("ลบสินค้าแล้ว","warning");await loadProducts();}catch(e){notify("ผิดพลาด","warning");}}
  async function editProduct(oldName,data){try{var r=await api("editProduct",null,{oldName:oldName,name:data.name,price:data.price});if(r.success){notify("แก้ไขสินค้าสำเร็จ");await loadProducts();return true;}else{notify(r.error||"ผิดพลาด","warning");return false;}}catch(e){notify(e.message,"warning");return false;}}

  return (
    <div style={S.app}>
      {notif && <div style={{...S.notif,background:notif.type==="success"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#f59e0b,#d97706)"}}>{notif.type==="success"?"✅":"⚠️"} {notif.msg}</div>}
      {loading && <div style={{position:"fixed",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#d97706,#f59e0b)",zIndex:9999}}/>}
      {slipProgress!==null && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9998,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:20,padding:"36px 48px",textAlign:"center",minWidth:300,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>

function LoginScreen({accounts,onLogin,onReload,onSetup}) {
  var [username,setUsername] = useState("");

  var [error,setError] = useState("");

  function shake(){if(ref.current){ref.current.classList.remove("shake");void ref.current.offsetWidth;ref.current.classList.add("shake");}}
  function go() {
    if(!username||!password){setError("กรอก Email และ Password");shake();return;}
    var acc=accounts.find(function(a){return a.username===username;});
    if(!acc){setError("ไม่พบ Email นี้ในระบบ");shake();return;}
    if(!acc.active){setError("บัญชีถูกระงับ");shake();return;}
    if(String(acc.password)!==String(password)){setError("Password ไม่ถูกต้อง");shake();return;}
    onLogin(acc);

  return (
    <div style={S.loginBg}><div ref={ref} style={S.loginCard}>

      <div style={{display:"flex",gap:8,justifyContent:"center"}}><button onClick={onReload} style={{...S.sm,background:"#f1f5f9",color:"#64748b"}}>🔄 โหลดบัญชี</button><button onClick={onSetup} style={{...S.sm,background:"#f1f5f9",color:"#64748b"}}>⚙️ เปลี่ยน URL</button></div>

/* ===== ADDRESS AUTO-COMPLETE ===== */
function searchAddr(query, field) {
  if (!query || query.length < 2 || typeof TH === "undefined") return [];
  var q = query.trim().replace(/^(เขต|อำเภอ|ตำบล|แขวง|อ\.|ต\.)\s*/,"");
  if (q.length < 2) return [];
  var fieldIdx = {s:0, d:1, p:2, z:3}[field] || 0;
  var results = [];
  for (var i = 0; i < TH.length && results.length < 20; i++) {
    if (TH[i][fieldIdx].indexOf(q) >= 0) results.push(TH[i]);
  }
  return results;
}

function AddrAC({label, value, field, onSelect, onChange}) {
  var [open, setOpen] = useState(false);
  var [results, setResults] = useState([]);
  var wrapRef = useRef(null);

  function handleChange(v) {
    onChange(v);
    var r = searchAddr(v, field);
    setResults(r);
    setOpen(r.length > 0);
  }

  function handleSelect(item) {
    onSelect(item);
    setOpen(false);
    setResults([]);
  }

  // ปิด dropdown เมื่อกดข้างนอก
  useEffect(function(){
    function handleClick(e){ if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handleClick);
    return function(){ document.removeEventListener("mousedown", handleClick); };
  },[]);

  return (
    <div ref={wrapRef} style={{position:"relative"}}>
      <label style={S.fLabel}>{label}</label>
      <input value={value||""} onChange={function(e){handleChange(e.target.value);}} onFocus={function(){if(results.length>0)setOpen(true);}}
        style={{...S.pInput,borderColor:value?"#fcd34d":"#e2e8f0",background:value?"#fffbeb":"#fff"}}/>
      {open && results.length > 0 && <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,background:"#fff",border:"1.5px solid #fde68a",borderRadius:10,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(217,119,6,.15)",marginTop:4}}>
        {results.map(function(item, idx){
          return <div key={idx} onClick={function(){handleSelect(item);}}
            style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #f1f5f9",fontSize:13,transition:"background .1s"}}
            onMouseEnter={function(e){e.currentTarget.style.background="#fffbeb";}}
            onMouseLeave={function(e){e.currentTarget.style.background="";}}>
            <div style={{fontWeight:600,color:"#1e293b"}}>{item[0]} <span style={{color:"#94a3b8",fontWeight:400}}>→</span> {item[1]}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{item[2]} {item[3]}</div>
          </div>;
        })}
      </div>}
    </div>
  );
}

/* ===== Product helpers ===== */
// ดึงแบรนด์หลัก เช่น "KISO", "RONG", "โปรแยก"
function getBrands(products) {
  var brands = [];
  products.forEach(function(p) {
    var match = p.name.match(/^\[([^\]]+)\]/);
    var cat = match ? match[1] : "อื่นๆ";
    var main = cat.split(/\s/)[0];
    if (brands.indexOf(main) < 0) brands.push(main);
  });
  return brands;
}

// ดึงกลุ่มย่อยทั้งหมด เช่น "KISO 50g", "KISO 10g ครีม", "RONG 10g"
function getCategories(products) {
  var cats = [];
  products.forEach(function(p) {
    var match = p.name.match(/^\[([^\]]+)\]/);
    var cat = match ? match[1] : "อื่นๆ";
    if (cats.indexOf(cat) < 0) cats.push(cat);
  });
  return cats;
}

// ดึงสินค้าตามแบรนด์
function getProductsByBrand(products, brand) {
  if (!brand) return [];
  return products.filter(function(p) {
    var match = p.name.match(/^\[([^\]]+)\]/);
    var cat = match ? match[1] : "อื่นๆ";
    return cat.indexOf(brand) === 0;
  }).map(function(p) {
    var match = p.name.match(/^\[([^\]]+)\]\s*(.*)/);
    return {name:p.name, shortName:match?match[2]:p.name, price:p.price, category:match?match[1]:""};
  });
}

// แบ่งกลุ่มย่อยภายในแบรนด์ เช่น KISO → [KISO 50g, KISO 10g ครีม, KISO 10g เซ็ต]
function getSubgroups(products, brand) {
  if (!brand) return [];
  var items = getProductsByBrand(products, brand);
  var groups = {};
  var order = [];
  items.forEach(function(p) {
    var cat = p.category || brand;
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push(p);
  });
  return order.map(function(label){return {label:label, items:groups[label]};});
}

/* ===== ORDER FORM — 2 Column Layout ===== */
function OrderForm({onSubmit,onCancel,user,isAdmin,loading,products}) {
  var [raw,setRaw] = useState("");
  var [f,setF] = useState({MobileNo:"",Name:"",Address:"",SubDistrict:"",District:"",ZIP:"",CustomerFBLine:"",SalePrice:"",COD:"",Remark:""});
  var [selectedProduct,setSelectedProduct] = useState("");
  var slipRef = useRef(null);
  var [slipPreview,setSlipPreview] = useState(null);
  var [isTransfer,setIsTransfer] = useState(false);
  var [upsell,setUpsell] = useState(false);
  var [saving,setSaving] = useState(false);

  // Per-category selections
  var [catSelections,setCatSelections] = useState({});

  function set(k,v){
    setF(function(p){
      var n={};for(var x in p)n[x]=p[x];n[k]=v;
      if ((k==="SubDistrict" || k==="District") && v) {
        var sub = k==="SubDistrict" ? v : n.SubDistrict;
        var dist = k==="District" ? v : n.District;
        var autoZip = lookupZIP(sub||"", dist||"");
        if (autoZip) n.ZIP = String(autoZip);
      }
      return n;
    });
  }

  function handleText(t) {
    setRaw(t);
    if (t.trim().length > 8) {
      var r = smartParse(t);
      if (r) {
        // ถ้า smartParse ไม่ได้ ZIP แต่ได้ ตำบล/อำเภอ → ค้นหาเพิ่ม
        if (!r.ZIP && (r.SubDistrict || r.District)) {
          var z = lookupZIP(r.SubDistrict, r.District);
          if (z) r.ZIP = z;
        }
        setF(function(p){var n={};for(var k in p)n[k]=r[k]||p[k];return n;});
      }
    }
  }

  function selectFromCat(cat, name) {
    var newSel = {};
    for(var k in catSelections) newSel[k] = catSelections[k];
    newSel[cat] = name;
    // ลบ selection จาก category อื่น
    getCategories(products||[]).forEach(function(c){ if(c!==cat) newSel[c]=""; });
    setCatSelections(newSel);
    setSelectedProduct(name);
    if (!name) { set("SalePrice",""); set("COD",""); set("Remark",""); return; }
    var prod = (products||[]).find(function(p){return p.name===name;});
    if (prod) {
      var shortName = name.replace(/^\[[^\]]+\]\s*/,"");
      set("SalePrice", String(prod.price));
      if (!isTransfer) set("COD", String(prod.price));
      set("Remark", shortName + (isTransfer ? " โอนเงิน" : " ปลายทาง"));
    }
  }

  function submit(){
    var missing = [];
    if(!selectedProduct) missing.push("เลือกสินค้า");
    if(!f.MobileNo) missing.push("เบอร์โทร");
    else if(f.MobileNo.length!==10) missing.push("เบอร์โทรต้อง 10 หลัก");
    if(!f.Name) missing.push("ชื่อลูกค้า");
    if(!f.ZIP) missing.push("รหัส ปณ.");
    else if(f.ZIP.length!==5) missing.push("รหัส ปณ. ต้อง 5 หลัก");
    if(!f.SalePrice) missing.push("ราคาขาย");
    if(!isTransfer && !f.COD && f.COD!=="0") missing.push("ยอด COD");
    if(missing.length>0){alert("กรุณากรอกให้ครบ:\n• "+missing.join("\n• "));return;}
    setSaving(true);
    var finalCOD = isTransfer ? "0" : f.COD;
    onSubmit({...f, COD:finalCOD, upsell:upsell, slipData:slipPreview||""});
  }
  function clear(){setRaw("");setF({MobileNo:"",Name:"",Address:"",SubDistrict:"",District:"",ZIP:"",CustomerFBLine:"",SalePrice:"",COD:"",Remark:""});setSelectedProduct("");setCatSelections({});setSlipPreview(null);setIsTransfer(false);setUpsell(false);}

  var now = new Date();
  var dateStr = String(now.getDate()).padStart(2,"0")+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+now.getFullYear();
  var timeStr = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  var icons = ["🍪","✨","💎","🌸","🧩","🎯"];

  return (
    <div style={{animation:"slideDown .3s",position:"relative"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800,margin:0}}>🍪 บันทึกออเดอร์</h2>
        <div style={{fontSize:13,color:"#94a3b8"}}>{dateStr} • {timeStr}</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {/* === เลือกสินค้า === */}
        <div style={{background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
          <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 16px"}}>🛒 เลือกสินค้า</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
          {getCategories(products||[]).map(function(cat,idx){
            var items = (products||[]).filter(function(p){var m=p.name.match(/^\[([^\]]+)\]/);return m?m[1]===cat:cat==="อื่นๆ";}).map(function(p){var m=p.name.match(/^\[([^\]]+)\]\s*(.*)/);return{name:p.name,shortName:m?m[2]:p.name,price:p.price};});
            return <div key={cat}>
              <div style={{fontSize:12,fontWeight:700,color:"#92400e",marginBottom:4}}>{cat}</div>
              <select value={catSelections[cat]||""} onChange={function(e){selectFromCat(cat,e.target.value);}}
                style={{width:"100%",padding:"10px 12px",borderRadius:8,border:catSelections[cat]?"2px solid #d97706":"1.5px solid #e2e8f0",fontSize:13,color:catSelections[cat]?"#1e293b":"#94a3b8",background:catSelections[cat]?"#fffbeb":"#fff",cursor:"pointer"}}>
                <option value="">-- เลือก --</option>
                {items.map(function(p){return <option key={p.name} value={p.name}>{p.shortName} — ฿{p.price.toLocaleString()}</option>;})}
              </select>
            </div>;
          })}
          </div>
        </div>

        {/* === วางข้อมูลลูกค้า === */}
        <div style={{background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
          <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 12px"}}>📋 วางข้อมูลลูกค้า (Auto-Parse)</h3>
          <textarea value={raw} onChange={function(e){handleText(e.target.value);}} placeholder="วางข้อมูลลูกค้าทั้งหมดที่นี่..." style={{width:"100%",padding:14,borderRadius:10,border:"1.5px solid #dbeafe",fontSize:14,lineHeight:1.6,color:"#1e293b",background:"#eff6ff",resize:"vertical",outline:"none",fontFamily:"'Noto Sans Thai',sans-serif",minHeight:80,boxSizing:"border-box"}} rows={3}/>
          <button onClick={clear} style={{marginTop:8,padding:"8px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>🗑 ล้าง</button>
        </div>

        {/* === ข้อมูลลูกค้า === */}
        <div style={{background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
            <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 16px"}}>👤 ข้อมูลลูกค้า</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><label style={S.fLabel}>เบอร์โทร <span style={{color:"#ef4444"}}>*</span></label><input value={f.MobileNo||""} onChange={function(e){var v=e.target.value.replace(/[^0-9]/g,"");if(v.length<=10)set("MobileNo",v);}} placeholder="0xxxxxxxxx" maxLength={10} style={S.pInput}/></div>
              <div><label style={S.fLabel}>ชื่อลูกค้า</label><input value={f.Name||""} onChange={function(e){set("Name",e.target.value);}} placeholder="ชื่อ-นามสกุล" style={S.pInput}/></div>
            </div>
            <div style={{marginBottom:12}}><label style={S.fLabel}>ที่อยู่</label><input value={f.Address||""} onChange={function(e){set("Address",e.target.value);}} placeholder="บ้านเลขที่ ซอย ถนน" style={S.pInput}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
              <AddrAC label="ตำบล" value={f.SubDistrict} field="s" onSelect={function(item){set("SubDistrict",item[0]);set("District",item[1]);set("ZIP",String(item[3]));}} onChange={function(v){set("SubDistrict",v);}}/>
              <AddrAC label="อำเภอ" value={f.District} field="d" onSelect={function(item){set("SubDistrict",item[0]);set("District",item[1]);set("ZIP",String(item[3]));}} onChange={function(v){set("District",v);}}/>
              <div><label style={S.fLabel}>รหัส ปณ. <span style={{color:"#ef4444"}}>*</span></label><input value={f.ZIP||""} onChange={function(e){var v=e.target.value.replace(/[^0-9]/g,"");if(v.length<=5)set("ZIP",v);}} placeholder="xxxxx" maxLength={5} style={S.pInput}/></div>
            </div>
            <div><label style={S.fLabel}>FB/Line (ไม่บังคับ)</label><input value={f.CustomerFBLine||""} onChange={function(e){set("CustomerFBLine",e.target.value);}} placeholder="ชื่อ FB หรือ Line ID" style={S.pInput}/></div>
          </div>
      </div>

      {/* === BOTTOM BAR === */}
      <div style={{marginTop:20,background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>

        {/* ราคา + COD + ปุ่ม 3 อัน */}
        <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{width:120}}>
            <label style={{fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>ราคาขาย</label>
            <input value={f.SalePrice||""} onChange={function(e){set("SalePrice",e.target.value);}} placeholder="0" style={{...S.pInput,fontWeight:700,fontSize:16,textAlign:"center"}}/>
          </div>
          <div style={{width:120}}>
            <label style={{fontSize:12,fontWeight:600,color:isTransfer?"#cbd5e1":"#ef4444",display:"block",marginBottom:4}}>{isTransfer?"COD (ปิด)":"ยอด COD"}</label>
            <input value={isTransfer?"0":f.COD||""} onChange={function(e){if(!isTransfer)set("COD",e.target.value);}} disabled={isTransfer}
              style={{...S.pInput,fontWeight:700,fontSize:16,textAlign:"center",color:isTransfer?"#cbd5e1":"#ef4444",background:isTransfer?"#f8fafc":"#fff",borderColor:isTransfer?"#e2e8f0":"#fecaca"}}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){if(!isTransfer)return;setIsTransfer(false);setSlipPreview(null);if(selectedProduct){var sn=selectedProduct.replace(/^\[[^\]]+\]\s*/,"");set("Remark",sn+" ปลายทาง");var pr=(products||[]).find(function(p){return p.name===selectedProduct;});if(pr)set("COD",String(pr.price));}}}
              style={{padding:"10px 16px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:!isTransfer?"#ef4444":"#f1f5f9",color:!isTransfer?"#fff":"#94a3b8"}}>COD</button>
            <button onClick={function(){if(isTransfer)return;setIsTransfer(true);set("COD","0");if(selectedProduct){var sn=selectedProduct.replace(/^\[[^\]]+\]\s*/,"");set("Remark",sn+" โอนเงิน");}}}
              style={{padding:"10px 16px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:isTransfer?"#10b981":"#f1f5f9",color:isTransfer?"#fff":"#94a3b8"}}>โอนเงิน</button>
            {(user.canUpsell||user.role==="admin") && <button onClick={function(){setUpsell(!upsell);}}
              style={{padding:"10px 16px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:upsell?"#ea580c":"#f1f5f9",color:upsell?"#fff":"#94a3b8"}}>Upsell</button>}
          </div>
        </div>

        {/* สลิป (โอนเงินเท่านั้น) */}
        {isTransfer && <div style={{marginBottom:16}}>
          <input ref={slipRef} type="file" accept="image/*" onChange={function(e){var file=e.target.files&&e.target.files[0];if(!file)return;if(file.size>5*1024*1024){alert("ไฟล์ใหญ่เกิน 5MB");return;}var reader=new FileReader();reader.onload=function(ev){setSlipPreview(ev.target.result);};reader.readAsDataURL(file);}} style={{display:"none"}}/>
          {slipPreview
            ? <div style={{display:"flex",alignItems:"center",gap:10}}>

                <button type="button" onClick={function(){slipRef.current.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:11,cursor:"pointer"}}>เปลี่ยน</button>
                <button type="button" onClick={function(){setSlipPreview(null);}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #fecaca",background:"#fff",color:"#ef4444",fontSize:11,cursor:"pointer"}}>ลบ</button>
              </div>
            : <button type="button" onClick={function(){slipRef.current.click();}} style={{padding:"8px 16px",borderRadius:8,border:"1px dashed #bbf7d0",background:"#f0fdf4",color:"#059669",fontSize:12,fontWeight:600,cursor:"pointer"}}>📎 แนบสลิป</button>

              <div>
                <div style={{fontSize:14,fontWeight:700}}>{selectedProduct.replace(/^\[[^\]]+\]\s*/,"")}</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>{f.Name||"—"} • {f.MobileNo||"—"} • ฿{Number(f.SalePrice||0).toLocaleString()} {isTransfer?"🟢โอน":"🔴COD"}{upsell?" 🟠Upsell":""}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={onCancel} disabled={saving} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:13,fontWeight:600,cursor:"pointer"}}>ยกเลิก</button>
                <button onClick={submit} disabled={saving} style={{padding:"10px 24px",borderRadius:8,border:"none",background:upsell?"#ea580c":isTransfer?"#10b981":"#d97706",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  {saving?"⏳ บันทึก...":"✅ บันทึก"}
                </button>
              </div>
            </div>
          : <div style={{padding:"14px",borderRadius:10,background:"#f8fafc",textAlign:"center",fontSize:13,color:"#94a3b8"}}>👈 เลือกสินค้าก่อน</div>
        }
      </div>

      {/* Saving Overlay */}
      {saving && <div style={{position:"fixed",inset:0,zIndex:10,background:"rgba(255,255,255,.85)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
        <div style={{width:48,height:48,border:"4px solid #fde68a",borderTopColor:"#d97706",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>

/* ===== DETAIL MODAL ===== */
function DetailModal({order,onClose,onDel,onUploadSlip,isAdmin}) {
  var o = order;
  var fileRef = useRef(null);
  var [uploading,setUploading] = useState(false);
  var [slipView,setSlipView] = useState(false);

  function handleFile(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert("ไฟล์ใหญ่เกิน 5MB"); return; }
    setUploading(true);
    var reader = new FileReader();
    reader.onload = function(ev) {
      onUploadSlip(o.OrderID, ev.target.result).then(function(){
        setUploading(false);
      });
    };
    reader.readAsDataURL(file);
  }

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={{...S.modalCard,animation:"popIn .2s"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"24px 28px 16px",borderBottom:"1px solid #f1f5f9"}}><div><h2 style={{fontSize:20,fontWeight:800,margin:0,fontFamily:"'JetBrains Mono',monospace",color:"#d97706"}}>{o.OrderID}</h2><div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>{o.Timestamp} • {o.SalesPerson}</div></div><button onClick={onClose} style={S.closeBtn}>✕</button></div>
        <div style={{padding:"20px 28px"}}>
          <Sec t="👤 ลูกค้า"><DR l="ชื่อ" v={o.Name}/><DR l="เบอร์" v={o.MobileNo}/><DR l="ที่อยู่" v={(o.Address||"")+" "+(o.SubDistrict||"")+" "+(o.District||"")+" "+(o.ZIP||"")}/>{o.CustomerFBLine && <DR l="FB/Line" v={o.CustomerFBLine}/>}</Sec>
          <Sec t="💳 การขาย"><DR l="ราคา" v={"฿"+Number(o.SalePrice||0).toLocaleString()} hl/><DR l="ประเภท" v={Number(o.COD||0)===0?"🟢 โอนเงิน":"🔴 COD ฿"+Number(o.COD||0).toLocaleString()}/>{o.Remark && <DR l="สินค้า" v={o.Remark}/>}<DR l="พนักงาน" v={o.SalesPerson}/></Sec>

          {/* 🧾 สลิป — เฉพาะโอนเงิน (COD=0) */}
          {Number(o.COD||0)===0 && <Sec t="🧾 สลิปโอนเงิน">
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>

                  <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"center"}}>
                    <button onClick={function(){fileRef.current.click();}} style={{...S.sm,background:"#fffbeb",color:"#d97706"}}>🔄 เปลี่ยนสลิป</button>
                    <a href={o.SlipURL} target="_blank" rel="noopener" style={{...S.sm,background:"#fffbeb",color:"#d97706",textDecoration:"none"}}>🔗 เปิดใน Drive</a>
                  </div>
                </div>
              : <div style={{textAlign:"center",padding:24,border:"2px dashed #fde68a",borderRadius:12,background:"#fffbeb"}}>
                  <div style={{fontSize:36,marginBottom:8}}>🧾</div>
                  <p style={{fontSize:13,color:"#94a3b8",marginBottom:10}}>ยังไม่มีสลิป</p>
                  <button onClick={function(){fileRef.current.click();}} disabled={uploading} style={{padding:"10px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#d97706,#f59e0b)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                    {uploading?"⏳ กำลังอัพโหลด...":"📎 อัพโหลดสลิป"}
                  </button>
                  <p style={{fontSize:11,color:"#cbd5e1",marginTop:8}}>JPG, PNG สูงสุด 5MB</p>
                </div>
            }
          </Sec>}
        </div>
        {isAdmin && <div style={{padding:"16px 28px 24px",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"flex-end"}}><button onClick={function(){if(confirm("ลบ?"))onDel(o.OrderID);}} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"#fef2f2",color:"#ef4444",fontSize:13,fontWeight:600,cursor:"pointer"}}>🗑 ลบ</button></div>}
      </div>
      {/* ดูสลิปเต็มจอ */}
      {slipView && o.SlipURL && <div style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={function(){setSlipView(false);}}><img src={driveImg(o.SlipURL)} alt="slip" style={{maxWidth:"90%",maxHeight:"90%",borderRadius:16,objectFit:"contain"}}/></div>}
    </div>
  );
}

/* ===== TEAM ===== */
function TeamPage({accounts,onAdd,onToggle,onToggleUpsell,onSaveUpsellBatch,onDel,onResetPw,onEditAcc}) {
  var [show,setShow] = useState(false);
  var [nf,setNf] = useState({username:"",displayName:"",password:"",role:"user"});
  var [resetId,setResetId] = useState(null);
  var [newPw,setNewPw] = useState("");
  var [editAcc,setEditAcc] = useState(null);
  var [editSaving,setEditSaving] = useState(false);
  var [upsellEdit,setUpsellEdit] = useState(null);
  var [saving,setSaving] = useState(false);
  function handleAdd(){if(!nf.username||!nf.displayName||!nf.password){alert("กรอกให้ครบ");return;}if(nf.password.length<4){alert("Password อย่างน้อย 4 ตัว");return;}onAdd({...nf,active:true}).then(function(ok){if(ok){setNf({username:"",displayName:"",password:"",role:"user"});setShow(false);}});}
  function startUE(){var c=[];accounts.forEach(function(a){if(a.canUpsell)c.push(a.username);});setUpsellEdit(c);}
  function toggleUE(u){setUpsellEdit(function(p){return p.indexOf(u)>=0?p.filter(function(x){return x!==u;}):p.concat([u]);});}

// แปลง Google Drive URL → URL ที่ใช้เป็น img src ได้
function driveImg(url) {
  if (!url) return "";
  // ดึง file ID จาก URL ทุกรูปแบบ
  var id = null;
  var m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/thumbnail\?id=([a-zA-Z0-9_-]+)/);
  if (m) id = m[1];
  if (id) return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
  // ถ้า lh3 → แปลงเป็น thumbnail
  var lh3 = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
  if (lh3) return "https://drive.google.com/thumbnail?id=" + lh3[1] + "&sz=w1000";
  return url;
}

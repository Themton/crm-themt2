async function syncToSheet(action,data){
  if(!SHEET_URL)return;
  var payload=JSON.stringify({action:action,data:data});
  // วิธี 1: fetch POST (ลอง 3 ครั้ง)
  for(var attempt=0;attempt<3;attempt++){
    try{
      await fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:payload});
      return; // สำเร็จ
    }catch(e){
      console.warn("Sheet sync attempt "+(attempt+1)+" failed:",e);
      if(attempt<2)await new Promise(function(r){setTimeout(r,2000);}); // รอ 2 วิ แล้วลองใหม่
    }
  }
  // วิธี 2: backup GET (ถ้า POST fail ทั้ง 3 ครั้ง)
  try{
    var params="action="+encodeURIComponent(action);
    var keys=Object.keys(data||{});
    for(var i=0;i<keys.length;i++){params+="&"+encodeURIComponent(keys[i])+"="+encodeURIComponent(String(data[keys[i]]||"").substring(0,200));}
    var img=new Image();img.src=SHEET_URL+"?"+params;
    setTimeout(function(){img=null;},15000);
  }catch(e){console.warn("Sheet backup sync failed:",e);}
}

// Supabase REST API helper (ไม่ต้องใช้ SDK)
async function sbFetch(path,opts){
  var url=SUPABASE_URL+"/rest/v1/"+path;
  var headers={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};
  if(opts&&opts.prefer)headers["Prefer"]=opts.prefer;
  if(opts&&opts.single)headers["Accept"]="application/vnd.pgrst.object+json";
  var method=(opts&&opts.method)||"GET";
  if(method==="PATCH"||method==="DELETE")headers["Prefer"]="return=minimal";
  if(method==="POST")headers["Prefer"]="return=representation";
  var res=await fetch(url,{method:method,headers:headers,body:opts&&opts.body?JSON.stringify(opts.body):undefined});
  if(!res.ok){var err=await res.text();throw new Error(err);}
  var ct=res.headers.get("content-type")||"";
  if(ct.indexOf("json")>=0)return await res.json();
  return null;
}

// สรุปสินค้าจาก Remark
function parseProducts(orders){
  var products={};
  var patterns=[
    {re:/R(?:ong)?\s*(?:NINE|9)\s*(\d+)/gi,name:"R NINE"},
    {re:/Rong\s*(\d+)/gi,name:"Rong"},
    {re:/Kiso\s*(\d+)/gi,name:"Kiso"},
    {re:/เซรั่ม\s*(\d+)/gi,name:"เซรั่ม"},
    {re:/สบู่\s*(\d+)/gi,name:"สบู่"},
    {re:/เอสเซน[ส์]*\s*(\d+)/gi,name:"เอสเซนส์"},
    {re:/ครีม\s*(\d+)/gi,name:"ครีม"},
    {re:/กันแดด\s*(\d+)/gi,name:"กันแดด"},
    {re:/โทนเนอร์\s*(\d+)/gi,name:"โทนเนอร์"},
    {re:/คลีน(?:ซิ่ง|ซิง)\s*(\d+)/gi,name:"คลีนซิ่ง"},
    {re:/แป้ง\s*(\d+)/gi,name:"แป้ง"},
    {re:/มาส์ก\s*(\d+)/gi,name:"มาส์ก"}
  ];
  (orders||[]).forEach(function(o){
    var rm=String(o.Remark||"");if(!rm)return;
    // ลอง pattern ทั้งหมด
    for(var p=0;p<patterns.length;p++){
      var re=new RegExp(patterns[p].re.source,"gi");
      var m;while((m=re.exec(rm))!==null){
        var name=patterns[p].name;
        var qty=parseInt(m[1])||1;
        if(!products[name])products[name]={name:name,qty:0,orders:0};
        products[name].qty+=qty;products[name].orders++;
      }
    }
    // จับ @ProductName (เช่น @Rong2)
    var atMatch=rm.match(/@(\w+)/g);
    if(atMatch){atMatch.forEach(function(a){
      var nm=a.substring(1).replace(/\d+$/,"");
      var qt=parseInt(a.match(/\d+$/)||"1")||1;
      if(nm&&nm.length>1){
        var key=nm.charAt(0).toUpperCase()+nm.slice(1).toLowerCase();
        if(!products[key])products[key]={name:key,qty:0,orders:0};
        products[key].qty+=qt;products[key].orders++;
      }
    });}
  });
  return Object.values(products).sort(function(a,b){return b.qty-a.qty;});
}

// ค้นหาตำบล+อำเภอ จาก TH database — แม้ไม่มี ต./อ. prefix
function matchAddrDB(text){
  if(typeof TH==="undefined")return null;
  var best=null,bestScore=0;
  // เตรียมคำทั้งหมดจาก text (ลบตัวเลข ลบคำไม่เกี่ยว)
  var clean=text.replace(/\d{5}/g,"").replace(/\d{9,10}/g,"").replace(/ปลายทาง|โอนเงิน|COD|บาท|Kiso|Rong|เซรั่ม|สบู่|ครีม/gi,"");
  for(var i=0;i<TH.length;i++){
    var sub=TH[i][0],dist=TH[i][1];
    var score=0;
    if(clean.indexOf(sub)>=0)score+=sub.length;
    if(clean.indexOf(dist)>=0)score+=dist.length;
    if(score>bestScore){bestScore=score;best=TH[i];}
  }
  if(best&&bestScore>=4)return{SubDistrict:best[0],District:best[1],Province:best[2],ZIP:String(best[3])};

async function dbUpdateStatus(orderIds,status,table,onProgress){
  var t=table||"orders";var total=orderIds.length;var done=0;var fail=0;
  var batchSize=100;var batches=[];
  for(var b=0;b<total;b+=batchSize){batches.push(orderIds.slice(b,b+batchSize));}
  var concurrent=3;
  for(var i=0;i<batches.length;i+=concurrent){
    var chunk=batches.slice(i,i+concurrent);
    var results=await Promise.all(chunk.map(function(batch){
      var ids=batch.join(",");
      return sbFetch(t+"?order_id=in.("+ids+")",{method:"PATCH",body:{status:status}}).then(function(){return{ok:batch.length};}).catch(function(){return{fail:batch.length};});
    }));
    results.forEach(function(r){if(r.ok)done+=r.ok;else fail+=(r.fail||0);});
    if(onProgress)onProgress(done,total,fail);
  }
  return{done:done,fail:fail};
}

function ProductRank({orders,title}){
  if(!orders||orders.length===0)return null;
  // แยกสินค้าจาก Remark
  var prodMap={};
  orders.forEach(function(o){
    var rm=String(o.Remark||"").trim();if(!rm)return;
    // ลบ [PREV:xxx] และราคา/ปลายทาง/โอนเงิน ออก
    var clean=rm.replace(/\[PREV:\d+\]\s*/g,"").replace(/ปลายทาง\s*\d+/gi,"").replace(/โอนเงิน\s*\d*/gi,"").replace(/\d+\s*บาท/gi,"").replace(/\s+/g," ").trim();
    if(!clean)clean=rm;
    var key=clean.toLowerCase();
    if(!prodMap[key])prodMap[key]={name:clean,count:0,sales:0};
    prodMap[key].count++;
    prodMap[key].sales+=Number(o.SalePrice)||0;
  });
  var prods=Object.values(prodMap).sort(function(a,b){return b.sales-a.sales;});
  if(prods.length===0)return null;
  var maxS=prods[0].sales||1;
  return<div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
    <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{title||"📦 โปรขายดี"}</div>
    <div style={{maxHeight:300,overflowY:"auto"}}>
    {prods.slice(0,20).map(function(p,i){
      var barW=Math.max(p.sales/maxS*100,5);
      return<div key={p.name+i} style={{marginBottom:6,padding:"8px 12px",borderRadius:8,background:i===0?"#fef3c7":i<3?"#fffbeb":"#f8fafc",border:i===0?"2px solid #fbbf24":"1px solid #e2e8f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14,width:24,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)}</span>
            <span style={{fontWeight:600,fontSize:12}}>{p.name}</span>
          </div>
          <span style={{fontWeight:800,fontSize:14,color:"#d97706"}}>฿{p.sales.toLocaleString()}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,height:5,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:barW+"%",background:i===0?"linear-gradient(90deg,#f59e0b,#d97706)":i<3?"#fbbf24":"#94a3b8",borderRadius:3}}/>
          </div>
          <span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{p.count} ออเดอร์</span>
        </div>
      </div>;
    })}
    </div>
  </div>;
}

function ReportPage({user,accounts,allOrders,upsellOrders}){
  var isAdmin=user.role==="admin";
  var[selPerson,setSelPerson]=useState("ALL");
  var[dateFrom,setDateFrom]=useState(todayStr());
  var[dateTo,setDateTo]=useState(todayStr());
  var[expandDate,setExpandDate]=useState(null);
  var[tab,setTab]=useState("orders");
  var[viewOrder,setViewOrder]=useState(null);
  var[activePeriod,setActivePeriod]=useState("");

  var sourceOrders=tab==="upsell"?(upsellOrders||[]):(allOrders||[]);

  // กรองตามคนและวันที่ — แยก Orders / Upsell / รวม
  function filterByDate(list){return(list||[]).filter(function(o){
    var d=getDate(o.Timestamp);if(d<dateFrom||d>dateTo)return false;
    if(selPerson!=="ALL"&&o.SalesPerson!==selPerson)return false;return true;
  });}
  var fOrders=filterByDate(allOrders);
  var fUpsell=filterByDate(upsellOrders);
  var filtered=tab==="upsell"?fUpsell:tab==="orders"?fOrders:fOrders.concat(fUpsell);

  function calcStats(list){var o=list.length,s=0,c=0,t=0,prev=0,diff=0;list.forEach(function(r){s+=Number(r.SalePrice)||0;var cv=Number(r.COD)||0;if(cv>0)c+=cv;else t+=Number(r.SalePrice)||0;var rm=String(r.Remark||"");var pm=rm.match(/\[PREV:(\d+)\]/);if(pm){var pp=Number(pm[1]);prev+=pp;diff+=(Number(r.SalePrice)||0)-pp;}});return{orders:o,sales:s,cod:c,transfer:t,prev:prev,diff:diff};}
  var stO=calcStats(fOrders),stU=calcStats(fUpsell),stAll=calcStats(fOrders.concat(fUpsell));

  // จัดกลุ่มตามวัน
  var dayMap={};
  filtered.forEach(function(o){
    var d=getDate(o.Timestamp);
    if(!dayMap[d])dayMap[d]={date:d,orders:[],sales:0,cod:0,transfer:0};
    dayMap[d].orders.push(o);dayMap[d].sales+=Number(o.SalePrice)||0;
    var c=Number(o.COD)||0;if(c>0)dayMap[d].cod+=c;else dayMap[d].transfer+=Number(o.SalePrice)||0;
  });
  var days=Object.values(dayMap).sort(function(a,b){return b.date>a.date?1:-1;});

  // สรุปแต่ละคน (สำหรับแสดงปุ่มเลือก)
  var personSummary={};
  filtered.forEach(function(o){
    var p=o.SalesPerson||"?";
    if(!personSummary[p])personSummary[p]={name:p,count:0,sales:0,prev:0,diff:0};
    personSummary[p].count++;personSummary[p].sales+=Number(o.SalePrice)||0;
    var rm=String(o.Remark||"");var pm=rm.match(/\[PREV:(\d+)\]/);if(pm){var pp=Number(pm[1]);personSummary[p].prev+=pp;personSummary[p].diff+=(Number(o.SalePrice)||0)-pp;}
